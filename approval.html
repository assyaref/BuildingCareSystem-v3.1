<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Approval — Building Care System</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <style>
        /* ===== GAYA TAMBAHAN ===== */
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-approved { background: #dcfce7; color: #16a34a; }
        .status-rejected { background: #fee2e2; color: #dc2626; }

        .dark-toggle {
            background: transparent;
            border: 1px solid var(--bs-border-color, #e2e8f0);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dark-toggle:hover {
            background: rgba(0,0,0,0.05);
            transform: rotate(20deg);
        }
        [data-theme="dark"] .dark-toggle {
            border-color: #3a3a52;
            color: #ffd700;
        }
        [data-theme="dark"] .dark-toggle:hover {
            background: #2a2a42;
        }

        .avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4b7bec;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .approval-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--bs-border-color, #e9edf4);
            transition: background 0.2s;
        }
        .approval-item:last-child { border-bottom: 0; }
        .approval-item:hover { background: rgba(75,123,236,0.03); }
        .approval-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 150px;
        }
        .approval-item .info .title {
            font-weight: 600;
            color: var(--bs-body-color, #1e293b);
            font-size: 15px;
        }
        .approval-item .info .sub {
            font-size: 13px;
            color: var(--bs-secondary-color, #64748b);
        }
        .approval-item .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-approve {
            background: #16a34a;
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-approve:hover { background: #15803d; transform: translateY(-1px); }
        .btn-reject {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-reject:hover { background: #b91c1c; transform: translateY(-1px); }

        @media (max-width: 768px) {
            .approval-item { flex-direction: column; align-items: stretch; }
            .approval-item .actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- SIDEBAR dirender secara otomatis oleh sidebar.js -->
    <aside class="sidebar"></aside>

    <main class="content">
        <div class="container-fluid">
            <!-- TOPBAR -->
            <header class="topbar d-flex justify-content-between align-items-center flex-wrap gap-3 p-3 bg-white border rounded shadow-sm mb-4">
                <div class="d-flex align-items-center gap-2">
                    <!-- Tombol hamburger menu untuk mobile responsiveness dari sidebar.js -->
                    <button class="btn btn-light d-lg-none" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <div>
                        <h3 class="fw-bold m-0">Approval</h3>
                        <small class="text-muted">Building Care System Enterprise<br /><span class="text-primary fw-semibold">Radiant Group Duri</span></small>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <button class="dark-toggle" id="darkModeToggle" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill" id="darkModeIcon"></i>
                    </button>
                    <div class="avatar-sm" id="userAvatar">U</div>
                    <div>
                        <div class="fw-bold" id="userName" style="font-size:14px;">Loading...</div>
                        <div class="text-muted" id="userRole" style="font-size:11px;font-weight:500;">User</div>
                    </div>
                </div>
            </header>

            <!-- KONTEN APPROVAL -->
            <section class="row g-4 mt-2">
                <div class="col-12">
                    <div class="card enterprise-card shadow-sm border-0">
                        <div class="card-header bg-transparent border-bottom fw-semibold">
                            <i class="bi bi-check-circle me-2 text-primary"></i>Pending Approval
                            <span class="badge bg-primary ms-2" id="pendingCount">0</span>
                        </div>
                        <div class="card-body" id="approvalListContainer">
                            <div id="approvalList" class="text-center text-muted py-4">Memuat data...</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<!-- ===== SKRIP EKSTERNAL ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Modul internal -->
<script src="config/config.js"></script>
<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/core/session.js"></script>
<script src="assets/js/core/ui.js"></script>
<script src="assets/js/core/utils.js"></script>
<script src="assets/js/modules/auth.js"></script>
<!-- Memuat sidebar.js yang menangani render & logika menu -->
<script src="assets/js/core/components/sidebar.js"></script>

<script>
    (function() {
        'use strict';

        // ============================================================
        //  1.  SESSION HELPER
        // ============================================================
        function getSession() {
            if (typeof BCS !== 'undefined' && BCS.Storage && typeof BCS.Storage.getSession === 'function') {
                return BCS.Storage.getSession();
            }
            try {
                const raw = localStorage.getItem('bcs_session');
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        function setSession(data) {
            if (typeof BCS !== 'undefined' && BCS.Storage && typeof BCS.Storage.setSession === 'function') {
                return BCS.Storage.setSession(data);
            }
            localStorage.setItem('bcs_session', JSON.stringify(data));
        }

        // ============================================================
        //  2.  MOCK DATA APPROVAL
        // ============================================================
        let mockApprovals = [
            { id: 'APR-001', kategori: 'Kebersihan', lokasi: 'Gedung A - Lantai 2', tanggal: '2026-07-02', status: 'pending', pelapor: 'Budi Santoso' },
            { id: 'APR-002', kategori: 'Perbaikan AC', lokasi: 'Ruang Rapat Utama', tanggal: '2026-07-03', status: 'pending', pelapor: 'Siti Rahma' },
            { id: 'APR-003', kategori: 'Listrik', lokasi: 'Gedung B - Lantai 1', tanggal: '2026-07-04', status: 'pending', pelapor: 'Agus Wijaya' },
        ];

        // ============================================================
        //  3.  RENDER APPROVAL
        // ============================================================
        function renderApprovals() {
            const container = document.getElementById('approvalList');
            const countBadge = document.getElementById('pendingCount');
            if (!container) return;

            const pending = mockApprovals.filter(a => a.status === 'pending');

            if (pending.length === 0) {
                container.innerHTML = `<div class="text-center text-muted py-4"><i class="bi bi-check-circle-fill text-success me-2"></i> Semua laporan sudah diproses</div>`;
                if (countBadge) countBadge.textContent = '0';
                return;
            }

            if (countBadge) countBadge.textContent = pending.length;

            let html = '';
            pending.forEach((item) => {
                html += `
                    <div class="approval-item" data-id="${item.id}">
                        <div class="info">
                            <div class="title">${item.kategori} — ${item.lokasi}</div>
                            <div class="sub">
                                <i class="bi bi-person me-1"></i>${item.pelapor} &nbsp;·&nbsp;
                                <i class="bi bi-calendar3 me-1"></i>${item.tanggal} &nbsp;·&nbsp;
                                <span class="status-badge status-pending">Pending</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-approve" data-id="${item.id}"><i class="bi bi-check-lg me-1"></i>Setujui</button>
                            <button class="btn-reject" data-id="${item.id}"><i class="bi bi-x-lg me-1"></i>Tolak</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            container.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    handleAction(this.dataset.id, 'approve');
                });
            });
            container.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    handleAction(this.dataset.id, 'reject');
                });
            });
        }

        // ============================================================
        //  4.  HANDLE APPROVE / REJECT
        // ============================================================
        function handleAction(id, action) {
            const item = mockApprovals.find(a => a.id === id);
            if (!item) return;

            const label = action === 'approve' ? 'menyetujui' : 'menolak';
            const icon = action === 'approve' ? 'question' : 'warning';

            Swal.fire({
                title: 'Konfirmasi',
                text: `Anda yakin ${label} laporan ${item.id}?`,
                icon: icon,
                showCancelButton: true,
                confirmButtonColor: action === 'approve' ? '#16a34a' : '#dc2626',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: `Ya, ${action === 'approve' ? 'Setujui' : 'Tolak'}`,
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    item.status = action === 'approve' ? 'approved' : 'rejected';
                    renderApprovals();
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil!',
                        text: `Laporan ${item.id} telah ${action === 'approve' ? 'disetujui' : 'ditolak'}.`,
                        timer: 2000,
                        showConfirmButton: false
                    });
                }
            });
        }

        // ============================================================
        //  5.  DARK MODE
        // ============================================================
        function initDarkMode() {
            const toggle = document.getElementById('darkModeToggle');
            const icon = document.getElementById('darkModeIcon');
            if (!toggle || !icon) return;

            const saved = localStorage.getItem('bcs_theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
            } else if (saved === 'light') {
                document.documentElement.removeAttribute('data-theme');
                icon.className = 'bi bi-moon-fill';
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.className = 'bi bi-sun-fill';
            }

            toggle.addEventListener('click', function() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    icon.className = 'bi bi-moon-fill';
                    localStorage.setItem('bcs_theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    icon.className = 'bi bi-sun-fill';
                    localStorage.setItem('bcs_theme', 'dark');
                }
            });
        }

        // ============================================================
        //  6.  USER INFO
        // ============================================================
        function loadUserInfo() {
            const session = getSession();
            const nameEl = document.getElementById('userName');
            const roleEl = document.getElementById('userRole');
            const avatarEl = document.getElementById('userAvatar');

            if (session && session.user) {
                const u = session.user;
                if (nameEl) nameEl.textContent = u.nama || u.name || u.username || 'User';
                if (roleEl) roleEl.textContent = u.role || 'User';
                if (avatarEl) avatarEl.textContent = (u.nama || u.name || u.username || 'U')[0].toUpperCase();
            } else {
                const defaultUser = { name: 'Andi Permana', role: 'ADMIN' };
                setSession({ user: defaultUser });
                if (nameEl) nameEl.textContent = defaultUser.name;
                if (roleEl) roleEl.textContent = defaultUser.role;
                if (avatarEl) avatarEl.textContent = defaultUser.name[0];
            }
        }

        // ============================================================
        //  7.  INIT
        // ============================================================
        function init() {
            initDarkMode();
            loadUserInfo();
            renderApprovals();
            console.log('✅ Approval page content fully initialized');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
</body>
</html>
