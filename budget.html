<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Budget Management - Building Care System Enterprise">
    <meta name="author" content="Radiant Group Duri">

    <title>Budget — Building Care System Enterprise</title>

    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <style>
        .avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4b7bec;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .budget-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .budget-estimated { background: #dbeafe; color: #1d4ed8; }
        .budget-pending { background: #fef3c7; color: #92400e; }
        .budget-approved { background: #d1fae5; color: #065f46; }
        .budget-paid { background: #a7f3d0; color: #065f46; }
        .budget-rejected { background: #fee2e2; color: #991b1b; }

        .dark-toggle {
            background: transparent;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dark-toggle:hover {
            background: #f0f2f5;
            transform: rotate(20deg);
        }
        [data-theme="dark"] .dark-toggle {
            border-color: #3a3a52;
            color: #ffd700;
        }
        [data-theme="dark"] .dark-toggle:hover {
            background: #2a2a42;
        }

        .summary-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .summary-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
        }
        .summary-card .summary-top {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .summary-card .summary-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }
        .summary-card .summary-icon.bg-info { background: linear-gradient(145deg, #7dd3fc, #0ea5e9); }
        .summary-card .summary-icon.bg-success { background: linear-gradient(145deg, #6ee7b7, #22c55e); }
        .summary-card .summary-icon.bg-warning { background: linear-gradient(145deg, #fcd34d, #f59e0b); }
        .summary-card .summary-icon.bg-danger { background: linear-gradient(145deg, #fca5a5, #ef4444); }
        .summary-card h6 {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-card .budget-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group select, .filter-group input {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
            background: #fafafa;
        }
        .filter-group select:focus, .filter-group input:focus {
            border-color: #4b7bec;
            outline: none;
            box-shadow: 0 0 0 3px rgba(75,123,236,0.15);
        }

        .btn-action {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .btn-action.view { background: #e3f2fd; color: #0d47a1; }
        .btn-action.view:hover { background: #bbdefb; }
        .btn-action.edit { background: #e8f5e9; color: #1b5e20; }
        .btn-action.edit:hover { background: #c8e6c9; }
        .btn-action.delete { background: #fbe9e7; color: #b71c1c; }
        .btn-action.delete:hover { background: #ffcdd2; }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 0.7fr 1fr 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }
        .item-row .form-control { font-size: 13px; padding: 6px 10px; }

        .modal-content { border-radius: 16px; border: none; }
        .modal-header { border-radius: 16px 16px 0 0; padding: 16px 24px; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #2d2d44; margin-bottom: 4px; }
        .form-group .required { color: #dc2626; }

        /* Sidebar Styles */
        .sidebar nav a.menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            color: var(--text-secondary, #64748b);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        .sidebar nav a.menu:hover {
            background: var(--bg-card-hover, #f1f5f9);
            color: var(--text-primary, #0f172a);
        }
        .sidebar nav a.menu.active {
            background: var(--accent-soft, #dbeafe);
            color: var(--accent-color, #2563eb);
            font-weight: 600;
        }
        .sidebar nav a.menu i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .sidebar nav a.menu.text-danger {
            color: #ef4444 !important;
        }
        .sidebar nav a.menu.text-danger:hover {
            background: #fef2f2 !important;
            color: #dc2626 !important;
        }

        @media (max-width: 768px) {
            .item-row { grid-template-columns: 1fr; }
            .filter-group { flex-direction: column; width: 100%; }
            .filter-group select, .filter-group input { width: 100%; }
        }
    </style>
</head>

<script>
(function() {
    'use strict';

    // =============================================
    // DARK MODE
    // =============================================
    function initDarkMode() {
        const toggle = document.getElementById('darkModeToggle');
        const icon = document.getElementById('darkModeIcon');
        if (!toggle) return;
        const savedTheme = localStorage.getItem('bcs_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (icon) {
            if (savedTheme === 'dark') {
                icon.className = 'bi bi-sun-fill';
                icon.style.color = '#ffd700';
            } else {
                icon.className = 'bi bi-moon-fill';
                icon.style.color = '';
            }
        }
        toggle.addEventListener('click', function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('bcs_theme', newTheme);
            if (icon) {
                if (newTheme === 'dark') {
                    icon.className = 'bi bi-sun-fill';
                    icon.style.color = '#ffd700';
                } else {
                    icon.className = 'bi bi-moon-fill';
                    icon.style.color = '';
                }
            }
        });
    }

    // =============================================
    // LOAD USER INFO
    // =============================================
    function loadUserInfo() {
        try {
            const session = BCS.Storage.getSession();
            if (session && session.user) {
                const u = session.user;
                document.getElementById('userName').textContent = u.nama || u.name || 'User';
                document.getElementById('userRole').textContent = u.role || 'User';
                document.getElementById('userAvatar').textContent = (u.nama || u.name || 'U').charAt(0).toUpperCase();
            }
        } catch (e) {
            console.warn('Load user info error:', e);
        }
    }

    // STATE
    let allBudget = [];
    let filteredBudget = [];
    let currentPage = 1;
    const perPage = 10;
    let isEdit = false;
    let editId = null;

    const tableBody = document.getElementById('budgetTableBody');
    const paginationEl = document.getElementById('pagination');

    // =============================================
    // HELPERS
    // =============================================
    function formatCurrency(amount) {
        if (!amount || isNaN(amount)) return 'Rp 0';
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
    }

    function formatDate(d) {
        if (!d) return '-';
        return new Date(d).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
    }

    function getStatusBadge(s) {
        const map = {
            'estimated': 'budget-estimated',
            'pending': 'budget-pending',
            'approved': 'budget-approved',
            'paid': 'budget-paid',
            'rejected': 'budget-rejected'
        };
        const label = {
            'estimated': 'Estimasi',
            'pending': 'Pending',
            'approved': '✅ Disetujui',
            'paid': '💳 Dibayar',
            'rejected': '❌ Ditolak'
        };
        return `<span class="budget-badge ${map[s] || 'budget-estimated'}">${label[s] || s}</span>`;
    }

    function showToast(msg, type = 'success') {
        Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        }).fire({ icon: type, title: msg });
    }

    // =============================================
    // FETCH DATA
    // =============================================
    async function fetchBudget() {
        try {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Memuat...</td></tr>`;
            BCS.App.Loading.show();

            const response = await BCS.Api.post('getBudgets', {});
            console.log('Budget response:', response);

            if (!response || !response.success) {
                tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Gagal memuat data</td></tr>`;
                return;
            }

            allBudget = response.data?.budgets || [];
            applyFilters();
            updateSummary();

        } catch (err) {
            console.error(err);
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Error: ${err.message}</td></tr>`;
        } finally {
            BCS.App.Loading.hide();
        }
    }

    // =============================================
    // FILTER
    // =============================================
    function applyFilters() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        const status = document.getElementById('filterStatus').value;
        const priority = document.getElementById('filterPriority').value;

        let result = allBudget;
        if (keyword) {
            result = result.filter(b =>
                (b.id || '').toLowerCase().includes(keyword) ||
                (b.description || '').toLowerCase().includes(keyword) ||
                (b.report_id || '').toLowerCase().includes(keyword)
            );
        }
        if (status) result = result.filter(b => b.status === status);
        if (priority) result = result.filter(b => b.priority === priority);

        filteredBudget = result;
        currentPage = 1;
        renderTable();
        renderPagination();
    }

    // =============================================
    // SUMMARY
    // =============================================
    function updateSummary() {
        let totalEst = 0, totalApp = 0, totalPen = 0, totalRej = 0;
        allBudget.forEach(b => {
            const val = parseFloat(b.total) || 0;
            const s = b.status || 'estimated';
            if (s === 'estimated') totalEst += val;
            else if (s === 'approved' || s === 'paid') totalApp += val;
            else if (s === 'pending') totalPen += val;
            else if (s === 'rejected') totalRej += val;
        });
        document.getElementById('totalEstimated').textContent = formatCurrency(totalEst);
        document.getElementById('totalApproved').textContent = formatCurrency(totalApp);
        document.getElementById('totalPending').textContent = formatCurrency(totalPen);
        document.getElementById('totalRejected').textContent = formatCurrency(totalRej);
    }

    // =============================================
    // RENDER TABLE
    // =============================================
    function renderTable() {
        const start = (currentPage - 1) * perPage;
        const pageData = filteredBudget.slice(start, start + perPage);

        if (pageData.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted"><i class="bi bi-inbox fs-4 d-block"></i>Tidak ada data</td></tr>`;
            return;
        }

        let html = '';
        pageData.forEach(b => {
            html += `
                <tr>
                    <td><span class="fw-bold">${b.id || '-'}</span></td>
                    <td>${b.report_id || '-'}</td>
                    <td>${b.description || '-'}</td>
                    <td class="fw-bold" style="color:#0ea5e9;">${formatCurrency(b.total)}</td>
                    <td>${getStatusBadge(b.status)}</td>
                    <td><span class="badge bg-secondary">${b.priority || 'medium'}</span></td>
                    <td>${formatDate(b.created_at || b.tanggal)}</td>
                    <td class="text-center">
                        <button class="btn-action view" data-id="${b.id}" title="Detail"><i class="bi bi-eye"></i></button>
                        <button class="btn-action edit" data-id="${b.id}" title="Edit"><i class="bi bi-pencil"></i></button>
                        <button class="btn-action delete" data-id="${b.id}" title="Hapus"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        tableBody.innerHTML = html;

        tableBody.querySelectorAll('.view').forEach(btn => btn.addEventListener('click', () => viewDetail(btn.dataset.id)));
        tableBody.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', () => openEdit(btn.dataset.id)));
        tableBody.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', () => deleteBudget(btn.dataset.id)));
    }

    // =============================================
    // PAGINATION
    // =============================================
    function renderPagination() {
        const total = Math.ceil(filteredBudget.length / perPage);
        if (total <= 1) { paginationEl.innerHTML = ''; return; }
        let html = '';
        html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage - 1}">&laquo;</a></li>`;
        for (let i = 1; i <= total; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        html += `<li class="page-item ${currentPage === total ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage + 1}">&raquo;</a></li>`;
        paginationEl.innerHTML = html;
        paginationEl.querySelectorAll('.page-link').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                const p = parseInt(this.dataset.page);
                if (p && p >= 1 && p <= total) { currentPage = p; renderTable(); renderPagination(); }
            });
        });
    }

    // =============================================
    // CRUD
    // =============================================
    function openModal(data = null) {
        const modal = new bootstrap.Modal(document.getElementById('budgetModal'));
        const form = document.getElementById('budgetForm');
        form.reset();

        // Reset items
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        addItemRow();

        if (data) {
            isEdit = true;
            editId = data.id;
            document.getElementById('modalTitle').textContent = 'Edit Budget';
            document.getElementById('budgetReportId').value = data.report_id || '';
            document.getElementById('budgetStatus').value = data.status || 'estimated';
            document.getElementById('budgetDescription').value = data.description || '';
            document.getElementById('budgetPriority').value = data.priority || 'medium';
            document.getElementById('budgetPaymentMethod').value = data.payment_method || 'cash';
            document.getElementById('budgetNotes').value = data.notes || '';

            // Populate items
            container.innerHTML = '';
            (data.items || []).forEach(item => {
                addItemRow(item);
            });
            if (container.children.length === 0) addItemRow();

            updateGrandTotal();
        } else {
            isEdit = false;
            editId = null;
            document.getElementById('modalTitle').textContent = 'Tambah Budget';
            document.getElementById('budgetStatus').value = 'estimated';
            document.getElementById('budgetPriority').value = 'medium';
        }

        modal.show();
    }

    function addItemRow(data = null) {
        const container = document.getElementById('itemsContainer');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" class="form-control item-name" placeholder="Nama item" value="${data?.name || ''}">
            <input type="number" class="form-control item-qty" placeholder="Qty" value="${data?.qty || 1}" min="1">
            <input type="number" class="form-control item-price" placeholder="Harga" value="${data?.price || ''}" min="0">
            <input type="text" class="form-control item-total bg-light" readonly placeholder="Total" value="${data ? formatCurrency((data.qty||0)*(data.price||0)) : ''}">
            <button type="button" class="btn btn-sm btn-outline-danger remove-item"><i class="bi bi-trash"></i></button>
        `;

        const qty = row.querySelector('.item-qty');
        const price = row.querySelector('.item-price');
        const total = row.querySelector('.item-total');

        function updateRowTotal() {
            const q = parseInt(qty.value) || 0;
            const p = parseInt(price.value) || 0;
            total.value = formatCurrency(q * p);
            updateGrandTotal();
        }

        qty.addEventListener('input', updateRowTotal);
        price.addEventListener('input', updateRowTotal);

        row.querySelector('.remove-item').addEventListener('click', function() {
            if (container.children.length > 1) {
                row.remove();
                updateGrandTotal();
            } else {
                showToast('Minimal 1 item', 'warning');
            }
        });

        container.appendChild(row);
        updateRowTotal();
    }

    function updateGrandTotal() {
        let grand = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const q = parseInt(row.querySelector('.item-qty').value) || 0;
            const p = parseInt(row.querySelector('.item-price').value) || 0;
            grand += q * p;
        });
        document.getElementById('budgetGrandTotal').value = formatCurrency(grand);
    }

    document.getElementById('addItem').addEventListener('click', () => addItemRow());

    document.getElementById('budgetForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const items = [];
        document.querySelectorAll('.item-row').forEach(row => {
            const name = row.querySelector('.item-name').value.trim();
            const qty = parseInt(row.querySelector('.item-qty').value) || 0;
            const price = parseInt(row.querySelector('.item-price').value) || 0;
            if (name) items.push({ name, qty, price });
        });

        if (items.length === 0) {
            showToast('Tambahkan minimal 1 item', 'warning');
            return;
        }

        const total = items.reduce((sum, it) => sum + (it.qty * it.price), 0);

        const data = {
            report_id: document.getElementById('budgetReportId').value.trim(),
            status: document.getElementById('budgetStatus').value,
            description: document.getElementById('budgetDescription').value.trim(),
            priority: document.getElementById('budgetPriority').value,
            payment_method: document.getElementById('budgetPaymentMethod').value,
            notes: document.getElementById('budgetNotes').value.trim(),
            items: items,
            total: total
        };

        if (!data.report_id || !data.description) {
            showToast('ID laporan dan deskripsi wajib diisi', 'warning');
            return;
        }

        try {
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

            let res;
            if (isEdit && editId) {
                res = await BCS.Api.post('updateBudget', { id: editId, ...data });
            } else {
                res = await BCS.Api.post('createBudget', data);
            }

            if (res && res.success) {
                showToast(isEdit ? 'Budget diperbarui' : 'Budget ditambahkan');
                bootstrap.Modal.getInstance(document.getElementById('budgetModal')).hide();
                await fetchBudget();
            } else {
                showToast(res?.message || 'Gagal', 'error');
            }
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        } finally {
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-save"></i> Simpan';
        }
    });

    async function openEdit(id) {
        const b = allBudget.find(x => x.id == id);
        if (b) openModal(b);
        else {
            try {
                const res = await BCS.Api.post('getBudget', { id });
                if (res.success) openModal(res.data);
                else showToast('Gagal memuat data', 'error');
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
        }
    }

    async function viewDetail(id) {
        try {
            const res = await BCS.Api.post('getBudget', { id });
            if (!res.success) { showToast('Gagal memuat detail', 'error'); return; }
            const b = res.data;
            const container = document.getElementById('detailContent');
            let itemsHtml = '';
            (b.items || []).forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>${item.name || '-'}</td>
                        <td class="text-center">${item.qty || 0}</td>
                        <td class="text-end">${formatCurrency(item.price || 0)}</td>
                        <td class="text-end">${formatCurrency((item.qty||0)*(item.price||0))}</td>
                    </tr>
                `;
            });

            container.innerHTML = `
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="text-muted" style="font-size:11px;">ID</div>
                        <div class="fw-bold">${b.id}</div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-muted" style="font-size:11px;">ID Laporan</div>
                        <div>${b.report_id || '-'}</div>
                    </div>
                    <div class="col-12">
                        <div class="text-muted" style="font-size:11px;">Deskripsi</div>
                        <div>${b.description || '-'}</div>
                    </div>
                    <div class="col-md-4">
                        <div class="text-muted" style="font-size:11px;">Status</div>
                        <div>${getStatusBadge(b.status)}</div>
                    </div>
                    <div class="col-md-4">
                        <div class="text-muted" style="font-size:11px;">Prioritas</div>
                        <div><span class="badge bg-secondary">${b.priority || 'medium'}</span></div>
                    </div>
                    <div class="col-md-4">
                        <div class="text-muted" style="font-size:11px;">Metode Pembayaran</div>
                        <div>${b.payment_method || '-'}</div>
                    </div>
                    <div class="col-12">
                        <div class="text-muted" style="font-size:11px;">Total</div>
                        <div class="fw-bold" style="font-size:20px;color:#0ea5e9;">${formatCurrency(b.total)}</div>
                    </div>
                    ${b.notes ? `<div class="col-12"><div class="text-muted" style="font-size:11px;">Catatan</div><div>${b.notes}</div></div>` : ''}
                    ${itemsHtml ? `
                        <div class="col-12">
                            <div class="text-muted" style="font-size:11px;">Rincian Item</div>
                            <table class="table table-sm">
                                <thead><tr><th>Item</th><th class="text-center">Qty</th><th class="text-end">Harga</th><th class="text-end">Total</th></tr></thead>
                                <tbody>${itemsHtml}</tbody>
                                <tfoot><tr class="fw-bold"><td colspan="3" class="text-end">Grand Total</td><td class="text-end">${formatCurrency(b.total)}</td></tr></tfoot>
                            </table>
                        </div>
                    ` : ''}
                </div>
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function deleteBudget(id) {
        const confirm = await Swal.fire({
            title: 'Hapus Budget?',
            text: 'Data tidak dapat dikembalikan!',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Ya, Hapus!'
        });
        if (!confirm.isConfirmed) return;

        try {
            const res = await BCS.Api.post('deleteBudget', { id });
            if (res.success) {
                showToast('Budget dihapus');
                await fetchBudget();
            } else {
                showToast(res?.message || 'Gagal', 'error');
            }
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    // =============================================
    // EXPORT
    // =============================================
    document.getElementById('exportBudgetExcel').addEventListener('click', function() {
        if (filteredBudget.length === 0) { showToast('Tidak ada数据', 'warning'); return; }
        const data = filteredBudget.map(b => ({
            'ID': b.id,
            'ID Laporan': b.report_id || '-',
            'Deskripsi': b.description || '-',
            'Total': formatCurrency(b.total),
            'Status': b.status || '-',
            'Prioritas': b.priority || '-',
            'Metode Pembayaran': b.payment_method || '-',
            'Tanggal': formatDate(b.created_at || b.tanggal)
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'Budget');
        XLSX.writeFile(wb, `Budget_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('Export Excel berhasil');
    });

    document.getElementById('exportBudgetPdf').addEventListener('click', function() {
        if (filteredBudget.length === 0) { showToast('Tidak ada data', 'warning'); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFontSize(14);
        doc.text('Budget List', 14, 20);
        doc.setFontSize(8);
        doc.text(`Generated: ${new Date().toLocaleString('id-ID')}`, 14, 28);
        const headers = ['ID', 'Laporan', 'Deskripsi', 'Total', 'Status', 'Prioritas'];
        const cols = [25, 25, 40, 25, 25, 25];
        let y = 36;
        doc.setFont('helvetica', 'bold');
        headers.forEach((h, i) => {
            const x = 14 + cols.slice(0, i).reduce((a, b) => a + b, 0);
            doc.text(h, x, y);
        });
        y += 4;
        doc.setFont('helvetica', 'normal');
        filteredBudget.slice(0, 50).forEach(b => {
            if (y > 270) { doc.addPage(); y = 20; }
            const row = [
                b.id || '-',
                b.report_id || '-',
                (b.description || '').substring(0, 20),
                formatCurrency(b.total),
                b.status || '-',
                b.priority || '-'
            ];
            row.forEach((val, i) => {
                const x = 14 + cols.slice(0, i).reduce((a, b) => a + b, 0);
                doc.text(String(val), x, y);
            });
            y += 5;
        });
        doc.save(`Budget_${new Date().toISOString().slice(0,10)}.pdf`);
        showToast('Export PDF berhasil');
    });

    // =============================================
    // EVENT BINDING
    // =============================================
    document.getElementById('btnAddBudget').addEventListener('click', () => openModal());
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('filterPriority').addEventListener('change', applyFilters);

    // =============================================
    // LOGOUT
    // =============================================
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        if (window.auth && typeof window.auth.logout === 'function') {
            window.auth.logout();
        } else {
            if (confirm('Keluar?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    });

    // =============================================
    // INIT
    // =============================================
    async function init() {
        initDarkMode();
        loadUserInfo();
        await fetchBudget();
        console.log('✅ Budget page initialized with dynamic sidebar');
    }

    document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
