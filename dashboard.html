<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Building Care System Enterprise v3.1
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="assets/css/dashboard.css">

</head>

<body>

<div class="wrapper">

    <aside class="sidebar">

        <div class="logo-area">

            <img
                src="assets/img/logo.png"
                class="logo">

            <h5>

                Building Care

            </h5>

            <small>

                Enterprise v3.1

            </small>

        </div>

        <nav>

            <a href="#"
               class="menu active">

                <i class="bi bi-grid-fill"></i>

                Dashboard

            </a>

            <a href="report.html"
               class="menu">

                <i class="bi bi-file-earmark-plus"></i>

                Report

            </a>

            <a href="monitoring.html"
               class="menu">

                <i class="bi bi-display"></i>

                Monitoring

            </a>

            <a href="history.html"
               class="menu">

                <i class="bi bi-clock-history"></i>

                History

            </a>

            <a href="approval.html"
               class="menu">

                <i class="bi bi-check-circle"></i>

                Approval

            </a>

            <a href="#"
               id="logoutBtn"
               class="menu text-danger">

                <i class="bi bi-box-arrow-right"></i>

                Logout

            </a>

        </nav>

    </aside>

    <main class="content">

        <header class="topbar">

            <div>

                <h3>

                    Dashboard

                </h3>

                <small>

                    Building Care System Enterprise

                </small>

            </div>

            <div
                class="user-info">

                <span
                    id="userName">

                    Loading...

                </span>

            </div>

        </header>

        <section
            class="row g-3 mt-2">

            <div class="col-lg-3">

                <div class="summary-card">

                    <h6>

                        Total Report

                    </h6>

                    <h2 id="totalReport">

                        0

                    </h2>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="summary-card">

                    <h6>

                        AC

                    </h6>

                    <h2 id="totalAC">

                        0

                    </h2>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="summary-card">

                    <h6>

                        Listrik

                    </h6>

                    <h2 id="totalListrik">

                        0

                    </h2>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="summary-card">

                    <h6>

                        Kondisi Gedung

                    </h6>

                    <h2 id="totalGedung">

                        0

                    </h2>

                </div>

            </div>

        </section>

        <section
            class="row mt-4">

            <div class="col-lg-8">

                <div class="card shadow-sm">

                    <div class="card-header">

                        Statistik Laporan

                    </div>

                    <div class="card-body">

                        <canvas
                            id="reportChart">

                        </canvas>

                    </div>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="card shadow-sm">

                    <div class="card-header">

                        Aktivitas Terbaru

                    </div>

                    <div
                        class="card-body"
                        id="recentActivity">

                        Loading...

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script
src="config/config.js">

</script>

<script
src="assets/js/app.js">

</script>

<script
src="assets/js/auth.js">

</script>

<script
src="https://cdn.jsdelivr.net/npm/chart.js">

</script>

<script
src="assets/js/dashboard.js">

</script>

</body>

</html>
