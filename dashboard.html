<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Dashboard - BCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --bg-body: #f8fafc; }
        body { background-color: var(--bg-body); font-family: 'Poppins', sans-serif; }
        .enterprise-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h3>Enterprise Dashboard</h3>
            <div>
                <button id="exportBtn" class="btn btn-outline-primary"><i class="bi bi-printer"></i> Print/Export</button>
                <button id="refreshBtn" class="btn btn-primary"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
        </header>

        <section class="row g-4">
            <div class="col-xl-3"><div class="card enterprise-card p-4"><h6>Total Report</h6><h2 id="totalReport">0</h2></div></div>
            <div class="col-xl-3"><div class="card enterprise-card p-4"><h6>Health Score</h6><h2 id="healthScore">0%</h2></div></div>
            <div class="col-xl-3"><div class="card enterprise-card p-4"><h6>Risk Level</h6><h2 id="riskLevel">-</h2></div></div>
            <div class="col-xl-3"><div class="card enterprise-card p-4"><h6>Next Forecast</h6><h2 id="forecast">0</h2></div></div>
        </section>

        <section class="mt-4">
            <div class="card enterprise-card p-4">
                <h5>Executive Summary</h5>
                <p id="execSummary">Loading AI analysis...</p>
            </div>
        </section>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
