<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Care System Enterprise</title>
    <link rel="manifest" href="assets/pwa/manifest.json">
    <meta name="theme-color" content="#0D6EFD">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Building Care">
    <link rel="apple-touch-icon" href="assets/pwa/icons/icon-192.png">

    <script src="assets/js/core/bootstrap.js"></script> 

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                if (typeof BCS !== 'undefined' && typeof BCS.bootstrap === 'function') {
                    await BCS.bootstrap();
                } else {
                    throw new Error("BCS Bootstrap Engine gagal dimuat.");
                }
            } catch (err) {
                console.error("[BCS-Bootstrap-Error]", err);
                // Fallback terakhir jika sistem bootstrap gagal total
                window.location.replace("login.html");
            }
        });
    </script>
</head>

<body>
    <div id="app-loader" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #0D6EFD;">
        <div style="text-align: center;">
            <p style="font-weight: bold; margin-bottom: 5px;">Building Care System</p>
            <p style="font-size: 14px; color: #6c757d; margin: 0;">Memuat sistem...</p>
        </div>
    </div>
</body>

</html>
