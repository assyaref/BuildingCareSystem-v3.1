<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Care System Enterprise</title>
    <link rel="manifest" href="assets/pwa/manifest.json">
    <meta name="theme-color" content="#0D6EFD">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Building Care">
    <link rel="apple-touch-icon" href="assets/pwa/icons/icon-192.png">

    <script src="assets/js/auth.js"></script> 

    <script>
        // Memastikan objek BCS dan modul Auth sudah tersedia sebelum dipanggil
        if (typeof BCS !== 'undefined' && BCS.Auth) {
            const user = BCS.Auth.user();
            if (user) {
                window.location.replace("dashboard.html");
            } else {
                window.location.replace("login.html");
            }
        } else {
            // Fallback jika modul gagal dimuat, amankan dengan mengarahkan ke login
            window.location.replace("login.html");
        }
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
