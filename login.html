<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Building Care System Enterprise - Radiant Group Duri">
    <meta name="author" content="Radiant Group Duri">

    <!-- ✅ PWA Meta Tags -->
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <title>Building Care System Enterprise</title>

    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <!-- ✅ Tambahkan icon untuk PWA (ukuran besar) -->
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/login.css">

</head>

<body>

<!-- LOADING OVERLAY -->
<div id="loading" class="loading-overlay" style="display:none;">
    <div class="text-center">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <div class="text-white mt-3">Please Wait...</div>
    </div>
</div>

<!-- LOGIN PAGE -->
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-xl-4 col-lg-5 col-md-6 col-sm-10">
            <div class="card login-card border-0 shadow-lg">
                <div class="card-body p-5">

                    <!-- LOGO -->
                    <div class="text-center mb-4">
                        <img src="assets/img/logo.png" alt="Logo" class="img-fluid" style="width:90px;">
                        <h3 class="fw-bold mt-3 mb-1">Building Care System</h3>
                        <p class="text-muted mb-0">Enterprise Edition</p>
                    </div>

                    <!-- LOGIN FORM -->
                    <form id="loginForm" autocomplete="off">

                        <!-- NIK -->
                        <div class="mb-3">
                            <label for="nik" class="form-label fw-semibold">NIK</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa-solid fa-id-card"></i>
                                </span>
                                <input
                                    id="nik"
                                    name="nik"
                                    type="text"
                                    class="form-control"
                                    placeholder="Masukkan NIK"
                                    autocomplete="username"
                                    inputmode="numeric"
                                    required>
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    class="form-control"
                                    placeholder="Masukkan Password"
                                    autocomplete="current-password"
                                    required>
                                <button
                                    id="togglePassword"
                                    type="button"
                                    class="btn btn-outline-secondary"
                                    aria-label="Toggle password visibility">
                                    <i id="togglePasswordIcon" class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- REMEMBER ME -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input id="remember" class="form-check-input" type="checkbox">
                                <label for="remember" class="form-check-label">Remember Me</label>
                            </div>
                            <small class="text-muted">Secure Login</small>
                        </div>

                        <!-- LOGIN BUTTON -->
                        <div class="d-grid">
                            <button id="btnLogin" type="submit" class="btn btn-primary btn-lg">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>LOGIN
                            </button>
                        </div>

                    </form>

                    <!-- INFO -->
                    <div class="text-center mt-4">
                        <small class="text-muted">
                            Dengan login ke sistem ini Anda menyetujui
                            penggunaan aplikasi Building Care System Enterprise.
                        </small>
                    </div>

                    <!-- FOOTER -->
                    <div class="text-center mt-5">
                        <small class="text-muted">Radiant Group Duri</small><br>
                        <small class="text-secondary">Version 3.2.0</small>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- ======================================================
     JAVASCRIPT
======================================================= -->

<!-- Library -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Config -->
<script src="config/config.js"></script>

<!-- 🔥 KRITIS: SESSION.js - PALING PERTAMA -->
<script src="assets/js/core/session.js"></script>

<!-- Core -->
<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/core/ui.js"></script>
<script src="assets/js/core/utils.js"></script>

<!-- Modules -->
<script src="assets/js/modules/auth.js"></script>

<!-- ✅ Registrasi Service Worker untuk PWA -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js')
                .then(function(registration) {
                    console.log('Service Worker registered successfully with scope:', registration.scope);
                })
                .catch(function(error) {
                    console.log('Service Worker registration failed:', error);
                });
        });
    }
</script>

</body>
</html>
