<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitoring Center</title>

<!-- Bootstrap -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->
<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Monitoring CSS -->
<link rel="stylesheet" href="./assets/css/monitoring.css">

</head>

<body class="bg-light">

<div class="container-fluid py-4">

    <!-- HEADER -->
    <div class="row mb-4">
        <div class="col-md-12">

            <h3 class="fw-bold">
                <i class="bi bi-display"></i>
                Monitoring Center
            </h3>

            <p class="text-muted mb-0">
                Real Time Enterprise Monitoring Dashboard
            </p>

        </div>
    </div>

    <!-- REPORT KPI -->
    <div class="row g-4">

        <div class="col-xl-3 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">

                    <small class="text-muted">
                        Total Report
                    </small>

                    <h2 class="fw-bold mt-2 text-primary"
                        id="monitorTotal">
                        0
                    </h2>

                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">

                    <small class="text-muted">
                        Open
                    </small>

                    <h2 class="fw-bold mt-2 text-danger"
                        id="monitorOpen">
                        0
                    </h2>

                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">

                    <small class="text-muted">
                        Progress
                    </small>

                    <h2 class="fw-bold mt-2 text-warning"
                        id="monitorProgress">
                        0
                    </h2>

                </div>
            </div>
        </div>

        <div class="col-xl-3 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">

                    <small class="text-muted">
                        Completed
                    </small>

                    <h2 class="fw-bold mt-2 text-success"
                        id="monitorDone">
                        0
                    </h2>

                </div>
            </div>
        </div>

    </div>

    <!-- SLA -->
    <div class="row mt-4">

        <div class="col-md-12">

            <div class="card shadow-sm border-0">

                <div class="card-header">
                    <i class="bi bi-speedometer2"></i>
                    SLA Analytics
                </div>

                <div class="card-body">

                    <div class="row text-center">

                        <div class="col-md-4">
                            <h2 class="text-success fw-bold">
                                <span id="fastPercent">0</span>%
                            </h2>
                            FAST
                        </div>

                        <div class="col-md-4">
                            <h2 class="text-warning fw-bold">
                                <span id="normalPercent">0</span>%
                            </h2>
                            NORMAL
                        </div>

                        <div class="col-md-4">
                            <h2 class="text-danger fw-bold">
                                <span id="latePercent">0</span>%
                            </h2>
                            LATE
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- sisanya sama -->
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Config -->
<script src="config/config.js"></script>
<script src="assets/js/core/app.js"></script>
<!-- API -->
<script src="assets/js/core/api.js"></script>
<!-- Monitoring JS -->
<script src="./assets/js/modules/monitoring.js"></script>

</body>
</html>
