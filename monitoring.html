<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Center — Building Care System</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <!-- Sertakan style tambahan jika diperlukan (bisa di file terpisah) -->
</head>

<body>
    <!-- APP WRAPPER -->
    <div class="wrapper">
        <!-- SIDEBAR (sama seperti sebelumnya) -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="assets/img/logo.png" class="logo" alt="Logo">
                <h5>Building Care</h5>
                <small>Enterprise v3.2</small>
            </div>
            <nav>
                <a href="dashboard.html" class="menu"><i class="bi bi-grid-fill"></i><span>Dashboard</span></a>
                <a href="report.html" class="menu"><i class="bi bi-file-earmark-plus"></i><span>Report</span></a>
                <a href="monitoring.html" class="menu active"><i class="bi bi-display"></i><span>Monitoring</span></a>
                <a href="history.html" class="menu"><i class="bi bi-clock-history"></i><span>History</span></a>
                <a href="approval.html" class="menu"><i class="bi bi-check-circle"></i><span>Approval</span></a>
                <a href="#" id="logoutBtn" class="menu text-danger"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            <div class="container-fluid">
                <!-- TOPBAR -->
                <header class="topbar d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h3>Monitoring Center</h3>
                        <small>Building Care System Enterprise<br><span class="brand-location">Radiant Group Duri</span></small>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="online-counter">
                            <i class="bi bi-person-fill text-primary"></i>
                            <span class="label">Online:</span>
                            <span class="count" id="onlineUserCount">0</span>
                            <span class="live-dot"></span>
                        </div>
                        <div class="d-flex align-items-center gap-2 px-3 py-1 rounded-3" style="background: var(--bg-card-hover); border: 1px solid var(--border-color);">
                            <span class="text-muted" style="font-size:12px;">Auto-refresh:</span>
                            <span id="refreshTimer" class="fw-bold" style="font-size:13px; min-width:20px; text-align:center;">7</span>
                            <span class="text-muted" style="font-size:11px;">detik</span>
                            <span class="live-dot"></span>
                        </div>
                        <button class="dark-toggle" id="darkModeToggle" title="Toggle Dark Mode">
                            <i class="bi bi-moon-fill" id="darkModeIcon"></i>
                        </button>
                        <div class="avatar-sm" id="userAvatar">U</div>
                        <div>
                            <div class="fw-bold" id="userName" style="font-size:14px;color:var(--text-primary);">Loading...</div>
                            <div class="text-muted" id="userRole" style="font-size:11px;font-weight:500;">User</div>
                        </div>
                    </div>
                </header>

                <!-- ===== SEMUA KONTEN (Summary, Status, SLA, Chart, History, System Health, User Online) ===== -->
                <!-- Saya singkat, karena struktur HTML-nya sama seperti sebelumnya, 
                     pastikan semua ID yang dibutuhkan oleh monitoring.js ada. 
                     Contoh: monitorTotal, monitorOpen, monitorProgress, monitorDone,
                     statusOpen, statusProgress, statusDone,
                     fastCount, normalCount, lateCount,
                     fastPercent, normalPercent, latePercent,
                     lastUpdate, recentActivity,
                     apiStatus, dbStatus, driveStatus,
                     serverTimeDisplay, timezoneLabel,
                     refreshBtn, onlineUserList, onlineCountBadge,
                     dan elemen chart (renderCategoryChart, reportChart, monthlyChart) -->
                
                <!-- Bagian ini sudah Anda miliki, saya tidak tulis ulang agar tidak terlalu panjang -->
                
            </div>
        </main>
    </div>

    <!-- ======================================================
         JAVASCRIPT
    ======================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Core -->
    <script src="config/config.js"></script>
    <script src="assets/js/core/app.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/session.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/modules/auth.js"></script>

    <!-- 🔥 MODULE MONITORING (external) -->
    <script src="assets/js/modules/monitoring.js"></script>

    <!-- Tidak ada inline script lagi, semua logic ada di monitoring.js -->
</body>
</html>
