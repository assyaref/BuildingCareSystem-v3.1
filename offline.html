<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline - Building Care System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #F5F7FA;
            padding: 20px;
        }
        .offline-box {
            background: #fff;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn-retry {
            background: #2563EB;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-retry:hover {
            background: #1d4ed8;
        }
        .btn-retry:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="offline-box">
        <div class="offline-icon">📡</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Silakan periksa jaringan internet Anda dan coba lagi.</p>
        <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
