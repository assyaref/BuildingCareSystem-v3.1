<form id="reportForm" class="enterprise-form">

    <div class="row g-4">

        <!-- Nama -->
        <div class="col-md-4">
            <label class="form-label">
                <i class="bi bi-person"></i>
                Nama Pelapor
            </label>

            <input
                id="nama"
                type="text"
                class="form-control"
                placeholder="Masukkan nama"
                required>
        </div>

        <!-- Departemen -->
        <div class="col-md-4">
            <label class="form-label">
                <i class="bi bi-building"></i>
                Departemen
            </label>

            <input
                id="departemen"
                type="text"
                class="form-control"
                placeholder="Departemen"
                required>
        </div>

        <!-- Lokasi -->
        <div class="col-md-4">
            <label class="form-label">
                <i class="bi bi-geo-alt"></i>
                Lokasi
            </label>

            <input
                id="lokasi"
                type="text"
                class="form-control"
                placeholder="Lokasi Kerusakan"
                required>
        </div>

        <!-- Kategori -->
        <div class="col-md-6">

            <label class="form-label">
                <i class="bi bi-grid"></i>
                Kategori
            </label>

            <select
                id="kategori"
                class="form-select"
                required>

                <option value="">Pilih Kategori</option>

                <option value="AC">
                    AC
                </option>

                <option value="LISTRIK">
                    LISTRIK
                </option>

                <option value="GEDUNG">
                    KONDISI GEDUNG
                </option>

            </select>

        </div>

        <!-- Prioritas -->
        <div class="col-md-6">

            <label class="form-label">
                <i class="bi bi-exclamation-circle"></i>
                Prioritas
            </label>

            <select
                id="prioritas"
                class="form-select"
                required>

                <option value="">Pilih Prioritas</option>

                <option value="LOW">
                    🟢 LOW
                </option>

                <option value="MEDIUM">
                    🟠 MEDIUM
                </option>

                <option value="HIGH">
                    🔴 HIGH
                </option>

            </select>

        </div>

        <!-- Deskripsi -->

        <div class="col-12">

            <label class="form-label">
                <i class="bi bi-card-text"></i>
                Deskripsi Kerusakan
            </label>

            <textarea
                id="deskripsi"
                class="form-control"
                rows="5"
                placeholder="Tuliskan detail kerusakan..."
                required></textarea>

        </div>

        <!-- Upload -->

        <div class="col-12">

            <label class="form-label">

                <i class="bi bi-camera"></i>

                Upload Foto

            </label>

            <div class="upload-box">

                <input
                    id="photo"
                    type="file"
                    class="form-control"
                    accept="image/*">

            </div>

        </div>

        <!-- Preview -->

        <div class="col-12 text-center">

            <img
                id="previewImage"
                class="img-fluid rounded shadow-sm d-none"
                style="max-height:300px;">

        </div>

        <!-- Button -->

        <div class="col-12">

            <div class="d-flex justify-content-end gap-3">

                <button
                    type="button"
                    id="resetReport"
                    class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-clockwise"></i>

                    Reset

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-send-fill"></i>

                    Kirim Report

                </button>

            </div>

        </div>

    </div>

</form>
