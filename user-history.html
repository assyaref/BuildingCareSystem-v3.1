<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>History - Building Care System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f3f4f6;
    }
    .app-card {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 900px;
      background: #1e5eff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(30,94,255,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin: 0 auto;
    }
    @media (max-width: 480px) {
      .app-card { border-radius: 0; max-height: 100vh; }
    }
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    .bottom-nav {
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding: 10px 0 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      text-align: center;
      flex-shrink: 0;
    }
    .bottom-nav a {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 700;
      transition: color 0.2s;
    }
    .bottom-nav a i { font-size: 20px; }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 6px;
      display: inline-block;
      letter-spacing: 0.3px;
    }
    .status-done { background: #dcfce7; color: #16a34a; }
    .status-progress { background: #fef3c7; color: #d97706; }
    .status-open { background: #fee2e2; color: #dc2626; }

    .history-item {
      transition: all 0.2s;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }
    .history-item:active { transform: scale(0.99); }

    .img-placeholder {
      width: 60px; height: 60px;
      background: #f3f4f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
      cursor: pointer;
    }
    .img-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .search-wrap {
      background: #f3f4f6;
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex: 1;
    }
    .search-wrap input {
      background: transparent;
      border: none;
      width: 100%;
      padding: 12px 0;
      font-size: 14px;
      color: #1f2937;
    }
    .search-wrap input::placeholder { color: #9ca3af; font-weight: 400; }
    .search-wrap input:focus { outline: none; }

    .filter-btn {
      background: #eff3ff;
      color: #1e5eff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn:active { background: #dbe3ff; transform: scale(0.95); }

    /* Modal photo preview */
    .photo-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .photo-modal.active {
      display: flex;
    }
    .photo-modal .modal-content {
      max-width: 90%;
      max-height: 90%;
      background: transparent;
      border-radius: 16px;
      position: relative;
    }
    .photo-modal .modal-content img {
      width: 100%;
      height: auto;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
    }
    .photo-modal .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app-card">
  <!-- Header -->
  <div class="flex-shrink-0" style="background:#1e5eff;">
    <div style="height:6px;"></div>
    <div class="px-5 pb-4 pt-2 text-center text-white">
      <h2 class="font-bold text-lg m-0">Riwayat Laporan</h2>
      <p class="text-xs text-blue-200 m-0" id="totalReports">0 laporan</p>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-content bg-white rounded-t-2xl px-5 pt-5 pb-4">
    <!-- Search -->
    <div class="flex gap-3 mb-5">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        <input type="text" id="searchInput" placeholder="Cari lokasi atau kategori..." />
      </div>
      <button class="filter-btn" id="filterBtn"><i class="fa-solid fa-sliders"></i></button>
    </div>

    <!-- List -->
    <div id="historyList" class="space-y-3">
      <!-- Items akan diisi oleh JS -->
      <div class="text-center text-gray-400 py-8" id="emptyMessage">
        <i class="fa-regular fa-clock text-3xl block mb-2"></i>
        <span>Belum ada laporan</span>
      </div>
    </div>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="#" id="navReport" class="text-gray-400">
      <i class="fa-solid fa-file-invoice"></i>
      <span>Report</span>
    </a>
    <a href="#" id="navHistory" class="text-[#1e5eff]">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <span>History</span>
    </a>
  </div>
</div>

<!-- Photo Modal -->
<div class="photo-modal" id="photoModal">
  <div class="modal-content">
    <button class="close-modal" id="closeModal">&times;</button>
    <img id="modalImage" src="" alt="Foto Laporan" />
  </div>
</div>

<script>
  (function() {
    'use strict';

    // =============================================
    // 1. DOM REFS
    // =============================================
    const historyList = document.getElementById('historyList');
    const searchInput = document.getElementById('searchInput');
    const filterBtn   = document.getElementById('filterBtn');
    const navReport   = document.getElementById('navReport');
    const navHistory  = document.getElementById('navHistory');
    const totalSpan   = document.getElementById('totalReports');
    const emptyMsg    = document.getElementById('emptyMessage');

    // Modal
    const modal       = document.getElementById('photoModal');
    const modalImg    = document.getElementById('modalImage');
    const closeModal  = document.getElementById('closeModal');

    // =============================================
    // 2. DATA STORE (simulasi dari localStorage / API)
    // =============================================
    // Untuk demo, kita gunakan data statis + bisa diambil dari localStorage
    // Bisa juga disimpan di localStorage setelah submit dari halaman report.
    // Kita akan gabungkan dengan data yang tersimpan dari laporan sebelumnya.

    function getDefaultReports() {
      return [
        {
          id: 1,
          kategori: 'LISTRIK',
          ikon: 'fa-bolt',
          lokasi: 'Ruang Meeting',
          tanggal: '2026-06-24T10:30:00',
          status: 'DONE',
          statusClass: 'status-done',
          deskripsi: 'Lampu padam total di ruang meeting utama.',
          foto: null // bisa berisi base64 atau URL
        },
        {
          id: 2,
          kategori: 'AC',
          ikon: 'fa-snowflake',
          lokasi: 'Ruang HR',
          tanggal: '2026-06-23T14:15:00',
          status: 'PROGRESS',
          statusClass: 'status-progress',
          deskripsi: 'AC tidak dingin, suhu ruangan 28°C.',
          foto: null
        },
        {
          id: 3,
          kategori: 'KONDISI GEDUNG',
          ikon: 'fa-building',
          lokasi: 'Toilet Lt. 2',
          tanggal: '2026-06-22T09:45:00',
          status: 'OPEN',
          statusClass: 'status-open',
          deskripsi: 'Pintu toilet rusak tidak bisa ditutup.',
          foto: null
        },
        {
          id: 4,
          kategori: 'LISTRIK',
          ikon: 'fa-bolt',
          lokasi: 'Ruang Server',
          tanggal: '2026-06-21T16:20:00',
          status: 'DONE',
          statusClass: 'status-done',
          deskripsi: 'UPS berbunyi alarm, listrik tidak stabil.',
          foto: null
        },
        {
          id: 5,
          kategori: 'PIPA BOCOR',
          ikon: 'fa-water',
          lokasi: 'Kantin Lt. 1',
          tanggal: '2026-06-20T08:00:00',
          status: 'PROGRESS',
          statusClass: 'status-progress',
          deskripsi: 'Pipa wastafel bocor, air menggenang.',
          foto: null
        },
        {
          id: 6,
          kategori: 'STOP KONTAK',
          ikon: 'fa-plug',
          lokasi: 'Ruang Rapat Lt. 3',
          tanggal: '2026-06-19T13:10:00',
          status: 'OPEN',
          statusClass: 'status-open',
          deskripsi: 'Stop kontak tidak berfungsi, tidak ada listrik.',
          foto: null
        }
      ];
    }

    // Ambil data dari localStorage (jika ada) atau gunakan default
    function loadReports() {
      let stored = localStorage.getItem('reports');
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed) && parsed.length) {
            return parsed;
          }
        } catch (e) {}
      }
      // Jika tidak ada di localStorage, simpan default
      const defaults = getDefaultReports();
      localStorage.setItem('reports', JSON.stringify(defaults));
      return defaults;
    }

    let reports = loadReports();

    // =============================================
    // 3. RENDER HISTORY
    // =============================================
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDate().toString().padStart(2, '0');
      const month = (d.getMonth()+1).toString().padStart(2, '0');
      const year = d.getFullYear();
      const hours = d.getHours().toString().padStart(2, '0');
      const mins = d.getMinutes().toString().padStart(2, '0');
      return `${day} ${month} ${year} • ${hours}:${mins}`;
    }

    function renderReports(data) {
      historyList.innerHTML = '';
      if (!data || data.length === 0) {
        historyList.innerHTML = `
          <div class="text-center text-gray-400 py-8">
            <i class="fa-regular fa-clock text-3xl block mb-2"></i>
            <span>Belum ada laporan</span>
          </div>
        `;
        totalSpan.textContent = '0 laporan';
        return;
      }

      totalSpan.textContent = data.length + ' laporan';

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item border border-gray-100 rounded-2xl p-4 flex items-center justify-between shadow-sm bg-white';
        div.dataset.id = item.id;

        const statusLabel = item.status || 'OPEN';
        let statusClass = 'status-open';
        if (statusLabel === 'DONE') statusClass = 'status-done';
        else if (statusLabel === 'PROGRESS') statusClass = 'status-progress';

        // Ikon kategori
        const icon = item.ikon || 'fa-building';

        // Foto thumbnail
        let fotoHtml = '';
        if (item.foto) {
          fotoHtml = `<img src="${item.foto}" alt="foto" />`;
        } else {
          fotoHtml = `<i class="fa-regular fa-image"></i>`;
        }

        div.innerHTML = `
          <div class="space-y-1 flex-1 pr-2">
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            <h4 class="font-bold text-sm text-gray-800 flex items-center gap-1.5 pt-1">
              <i class="fa-solid ${icon} text-[#1e5eff] text-xs"></i> ${item.kategori}
            </h4>
            <p class="text-xs text-gray-500 font-medium">${item.lokasi}</p>
            <p class="text-[11px] text-gray-400 flex items-center gap-1">
              <i class="fa-regular fa-calendar"></i> ${formatDate(item.tanggal)}
            </p>
          </div>
          <div class="flex items-center gap-2">
            <div class="img-placeholder" data-foto="${item.foto || ''}" onclick="openPhotoModal(this)">
              ${fotoHtml}
            </div>
            <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
          </div>
        `;
        historyList.appendChild(div);
      });
    }

    // =============================================
    // 4. SEARCH / FILTER
    // =============================================
    function filterReports(keyword) {
      keyword = keyword.toLowerCase().trim();
      if (!keyword) {
        renderReports(reports);
        return;
      }
      const filtered = reports.filter(item =>
        item.lokasi.toLowerCase().includes(keyword) ||
        item.kategori.toLowerCase().includes(keyword) ||
        item.deskripsi.toLowerCase().includes(keyword)
      );
      renderReports(filtered);
    }

    searchInput.addEventListener('input', function() {
      filterReports(this.value);
    });

    // Filter button (demo: bisa diisi dengan opsi filter tambahan)
    filterBtn.addEventListener('click', function() {
      // Contoh sederhana: filter status tertentu
      const currentStatus = prompt('Filter berdasarkan status (ketik: DONE, PROGRESS, OPEN, atau kosongkan untuk reset)');
      if (currentStatus === null) return;
      const statusFilter = currentStatus.trim().toUpperCase();
      if (!statusFilter) {
        renderReports(reports);
        searchInput.value = '';
        return;
      }
      const filtered = reports.filter(item => item.status === statusFilter);
      renderReports(filtered);
    });

    // =============================================
    // 5. PHOTO MODAL
    // =============================================
    window.openPhotoModal = function(el) {
      const foto = el.dataset.foto;
      if (!foto) {
        alert('Tidak ada foto untuk laporan ini');
        return;
      }
      modalImg.src = foto;
      modal.classList.add('active');
    };

    closeModal.addEventListener('click', function() {
      modal.classList.remove('active');
    });

    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });

    // =============================================
    // 6. NAVIGASI
    // =============================================
    navReport.addEventListener('click', function(e) {
      e.preventDefault();
      // Ganti ke halaman report (bisa redirect ke user-report.html)
      window.location.href = 'user-report.html'; // sesuaikan nama file report
    });

    navHistory.addEventListener('click', function(e) {
      e.preventDefault();
      // sudah di halaman history, refresh data
      renderReports(reports);
    });

    // =============================================
    // 7. INISIALISASI
    // =============================================
    renderReports(reports);

    // Menambahkan laporan baru dari localStorage (jika ada update dari report)
    // Jika ingin sinkronisasi otomatis dengan halaman report, kita bisa
    // menyimpan data di localStorage dan reload.
    // Fungsi ini bisa dipanggil dari halaman report setelah submit.
    // Contoh: localStorage.setItem('reports', JSON.stringify(newData));

    // Sinkronisasi: jika ada perubahan dari halaman lain (storage event)
    window.addEventListener('storage', function(e) {
      if (e.key === 'reports') {
        const newData = JSON.parse(e.newValue);
        if (Array.isArray(newData)) {
          reports = newData;
          renderReports(reports);
        }
      }
    });

    // =============================================
    // 8. TAMBAHAN: HAPUS LAPORAN (opsional)
    // =============================================
    // Bisa ditambahkan fitur hapus dengan klik kanan atau tombol, untuk demo tidak disertakan.

  })();
</script>
</body>
</html>
