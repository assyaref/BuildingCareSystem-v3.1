<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>History - Building Care System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; background:#f3f4f6; }
    .app-card { width:100%; max-width:420px; height:100vh; max-height:900px; background:#1e5eff; border-radius:28px; box-shadow:0 20px 60px rgba(30,94,255,0.25); display:flex; flex-direction:column; overflow:hidden; margin:0 auto; position: relative; }
    @media (max-width:480px){ .app-card { border-radius:0; max-height:100vh; } }
    .scroll-content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; -ms-overflow-style:none; scrollbar-width:none; }
    .scroll-content::-webkit-scrollbar { display:none; }
    .bottom-nav { background:#fff; border-top:1px solid rgba(0,0,0,0.05); padding:10px 0 12px; display:grid; grid-template-columns:1fr 1fr; text-align:center; flex-shrink:0; }
    .bottom-nav a { text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; font-weight:700; transition:color 0.2s; }
    .bottom-nav a i { font-size:20px; }
    
    /* Status Badges */
    .status-badge { font-size:10px; font-weight:700; padding:2px 10px; border-radius:6px; display:inline-block; letter-spacing:0.3px; }
    .status-done { background:#dcfce7; color:#16a34a; }
    .status-progress { background:#fef3c7; color:#d97706; }
    .status-open { background:#fee2e2; color:#dc2626; }
    
    /* Filter Chips Styles */
    .filter-chip { font-size:12px; font-weight:600; padding:6px 14px; border-radius:20px; background:#f3f4f6; color:#6b7280; transition:all 0.2s; border:1px solid transparent; cursor:pointer; }
    .filter-chip:active { transform:scale(0.95); }
    .filter-chip.active[data-status="ALL"] { background:#1e5eff; color:#fff; }
    .filter-chip.active[data-status="OPEN"] { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }
    .filter-chip.active[data-status="PROGRESS"] { background:#fef3c7; color:#d97706; border-color:#fde047; }
    .filter-chip.active[data-status="DONE"] { background:#dcfce7; color:#16a34a; border-color:#86efac; }

    .history-item { transition:all 0.2s; cursor:default; -webkit-tap-highlight-color:transparent; }
    .history-item:active { transform:scale(0.99); }
    .history-item.target-report {
      border-color:#1e5eff !important;
      box-shadow:0 0 0 4px rgba(30,94,255,.12), 0 12px 28px rgba(30,94,255,.16) !important;
      animation:targetPulse 1.4s ease 2;
    }
    @keyframes targetPulse {
      0%,100% { transform:scale(1); }
      50% { transform:scale(1.015); }
    }
    .img-thumb { width:60px; height:60px; background:#f3f4f6; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#d1d5db; font-size:22px; flex-shrink:0; overflow:hidden; cursor:pointer; }
    .img-thumb img { width:100%; height:100%; object-fit:cover; }
    
    .search-wrap { background:#f3f4f6; border-radius:14px; display:flex; align-items:center; padding:0 16px; gap:12px; flex:1; }
    .search-wrap input { background:transparent; border:none; width:100%; padding:12px 0; font-size:14px; color:#1f2937; }
    .search-wrap input::placeholder { color:#9ca3af; font-weight:400; }
    .search-wrap input:focus { outline:none; }
    
    .header-btn { background:transparent; border:none; color:#fff; cursor:pointer; padding:4px; font-size:18px; transition:opacity 0.2s; }
    .header-btn:hover { opacity:0.8; }
    .header-btn:active { transform:scale(0.95); }
    .avatar-circle { width:36px; height:36px; border-radius:50%; background:#4b7bec; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }

    /* Custom Toast Logout Style */
    #logoutToast { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    #logoutToast.show { transform: translateY(0); }
  
    /* Smartphone Push Notification Card */
    .push-card{margin-bottom:18px;padding:14px;border:1px solid #dbeafe;border-radius:16px;background:linear-gradient(145deg,#f8fbff,#eef4ff)}
    .push-row{display:flex;align-items:center;gap:12px}
    .push-icon{width:44px;height:44px;flex-shrink:0;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#1e5eff;color:#fff;font-size:18px;box-shadow:0 8px 20px rgba(30,94,255,.22)}
    .push-info{min-width:0;flex:1}.push-title{font-size:13px;font-weight:800;color:#0f172a}.push-desc{margin-top:2px;font-size:10px;line-height:1.45;color:#64748b}
    .push-btn{border:0;border-radius:11px;padding:9px 11px;background:#1e5eff;color:#fff;font-size:10px;font-weight:800;white-space:nowrap}
    .push-btn.active{background:#dcfce7;color:#15803d}.push-btn:disabled{opacity:.65}

  </style>
</head>
<body>
<div class="app-card">
  <!-- Header -->
  <div class="flex-shrink-0" style="background:#1e5eff;">
    <div style="height:6px;"></div>
    <div class="px-5 pb-4 pt-2 flex items-center justify-between text-white">
      <div class="flex items-center gap-3">
        <div class="avatar-circle" id="userAvatar">U</div>
        <div>
          <h2 class="font-bold text-lg flex items-center gap-1.5 m-0" id="userName">Halo, User 👋</h2>
          <p class="text-xs text-blue-200 m-0" id="userDept">Departemen</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="header-btn" id="notifBtn">
          <i class="fa-solid fa-bell"></i>
        </button>
        <button class="header-btn" id="logoutBtn" title="Keluar">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-content bg-white rounded-t-2xl px-5 pt-5 pb-4">

    <!-- Smartphone Push Notification -->
    <div class="push-card" id="pushNotificationCard">
      <div class="push-row">
        <div class="push-icon"><i class="fa-solid fa-bell"></i></div>
        <div class="push-info">
          <div class="push-title">Notifikasi Smartphone</div>
          <div class="push-desc" id="pushNotificationText">Terima update status laporan langsung di HP.</div>
        </div>
        <button class="push-btn" id="enableNotificationBtn" type="button">Aktifkan</button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="flex gap-3 mb-4">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        <input type="text" id="searchHistory" placeholder="Cari lokasi atau kategori..." />
      </div>
    </div>

    <!-- Modern Filter Chips Container -->
    <div class="flex items-center gap-2 mb-5 overflow-x-auto pb-1" style="scrollbar-width: none; -ms-overflow-style: none;">
      <style>.scroll-content::-webkit-scrollbar { display:none; }</style>
      <button class="filter-chip active" data-status="ALL">Semua</button>
      <button class="filter-chip" data-status="OPEN">Open</button>
      <button class="filter-chip" data-status="PROGRESS">Progress</button>
      <button class="filter-chip" data-status="DONE">Done</button>
    </div>

    <!-- List Items -->
    <div id="historyList">
      <div class="text-center text-gray-400 py-8">
        <i class="fa-regular fa-clock text-3xl block mb-2"></i>
        <span>Memuat data...</span>
      </div>
    </div>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="#" id="navReport" class="text-gray-400"><i class="fa-solid fa-file-invoice"></i><span>Report</span></a>
    <a href="#" id="navHistory" class="text-[#1e5eff]"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
  </div>

  <!-- Modern Interactive Logout Toast Overlay -->
  <div id="logoutOverlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 opacity-0 pointer-events-none transition-opacity duration-300 flex items-end">
    <div id="logoutToast" class="w-full bg-white rounded-t-3xl p-6 shadow-2xl space-y-5">
      <div class="flex justify-center">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
      </div>
      <div class="text-center space-y-2">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-2 animate-bounce">
          <i class="fa-solid fa-right-from-bracket"></i>
        </div>
        <h3 class="text-gray-800 font-bold text-lg">Ingin Keluar Aplikasi?</h3>
        <p class="text-gray-500 text-sm max-w-xs mx-auto">Anda perlu memasukkan ulang kredensial untuk mengakses data kembali.</p>
      </div>
      <div class="grid grid-cols-2 gap-3 pt-2">
        <button id="cancelLogoutBtn" class="py-3.5 rounded-xl border border-gray-200 font-semibold text-gray-700 hover:bg-gray-50 active:scale-[0.98] transition-all text-sm">
          Batal
        </button>
        <button id="confirmLogoutBtn" class="py-3.5 rounded-xl bg-red-500 font-semibold text-white shadow-lg shadow-red-500/20 hover:bg-red-600 active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2">
          <span>Ya, Keluar</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Preview Foto (Bootstrap) -->
<div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true" style="display:none;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:transparent;border:none;">
      <div class="modal-body p-0 text-center">
        <img id="photoPreview" src="" alt="Foto Laporan" class="img-fluid rounded" style="max-height:80vh;" />
      </div>
    </div>
  </div>
</div>

<!-- SCRIPT ENTERPRISE + jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="config/config.js"></script>
<script src="assets/js/core/session.js"></script>
<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/modules/auth.js"></script>

<script>
  (function() {
    'use strict';

    let allReports = [];
    let currentStatusFilter = 'ALL';


    // =============================================
    // SMARTPHONE PUSH NOTIFICATION
    // =============================================
    const enableNotificationBtn = document.getElementById('enableNotificationBtn');
    const pushNotificationText = document.getElementById('pushNotificationText');

    function updatePushNotificationUI() {
      if (!enableNotificationBtn || !pushNotificationText) return;

      if (!('Notification' in window)) {
        enableNotificationBtn.textContent = 'Tidak didukung';
        enableNotificationBtn.disabled = true;
        pushNotificationText.textContent = 'Browser ini belum mendukung notifikasi.';
        return;
      }

      if (Notification.permission === 'granted' && localStorage.getItem('BCS_FCM_TOKEN')) {
        enableNotificationBtn.textContent = 'Aktif';
        enableNotificationBtn.classList.add('active');
        enableNotificationBtn.disabled = true;
        pushNotificationText.textContent = 'Perangkat ini siap menerima update OPEN, PROGRESS, dan DONE.';
      } else if (Notification.permission === 'denied') {
        enableNotificationBtn.textContent = 'Diblokir';
        enableNotificationBtn.disabled = true;
        pushNotificationText.textContent = 'Izin notifikasi diblokir. Aktifkan dari pengaturan browser.';
      }
    }

    enableNotificationBtn?.addEventListener('click', async function() {
      const oldText = this.textContent;
      this.disabled = true;
      this.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      try {
        if (!window.BCSPush) {
          throw new Error('Modul notifikasi belum siap. Muat ulang halaman.');
        }

        const result = await window.BCSPush.enable();

        if (result?.success) {
          this.textContent = 'Aktif';
          this.classList.add('active');
          pushNotificationText.textContent = 'Perangkat ini siap menerima update OPEN, PROGRESS, dan DONE.';

          if (typeof showCenterAlert === 'function') {
            showCenterAlert('success', '🔔 Notifikasi smartphone berhasil diaktifkan');
          }
        } else {
          this.textContent = oldText;
          this.disabled = false;
          pushNotificationText.textContent = 'Izin notifikasi belum diberikan.';
        }
      } catch (error) {
        console.error('[Push Notification]', error);
        this.textContent = oldText;
        this.disabled = false;
        pushNotificationText.textContent = 'Gagal mengaktifkan. Coba lagi.';

        if (typeof showCenterAlert === 'function') {
          showCenterAlert('error', '❌ ' + error.message);
        } else {
          alert(error.message);
        }
      }
    });

    updatePushNotificationUI();


    // =============================================
    // 1. LOAD USER DATA
    // =============================================
    function loadUser() {
      try {
        const session = BCS.Storage.getSession();
        const user = session?.user || {};
        const nama = user.nama || user.name || 'User';
        const dept = user.departemen || user.department || '';
        const nik = session?.nik || user.nik || '';

        document.getElementById('userName').textContent = `Halo ${nama} 👋`;
        document.getElementById('userDept').textContent = dept || nik || 'Building Care';
        const avatar = document.getElementById('userAvatar');
        avatar.textContent = nama.charAt(0).toUpperCase() || 'U';

        window._user = { nama: nama.toLowerCase().trim(), nik: nik.trim(), dept };
      } catch (e) {
        console.warn('Gagal load user:', e);
        window._user = { nama: '', nik: '', dept: '' };
      }
    }

    // =============================================
    // 2. LOAD HISTORY
    // =============================================
    async function loadHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fa-regular fa-clock text-3xl block mb-2"></i><span>Memuat data...</span></div>';

      try {
        const response = await BCS.Api.post('getReport', {});
        if (!response || !response.success) {
          list.innerHTML = `<div class="text-center text-red-400 py-8">Gagal memuat data: ${response?.message || 'Unknown error'}</div>`;
          return;
        }

        const reports = response.data?.reports || [];
        if (!reports.length) {
          list.innerHTML = `<div class="text-center text-gray-400 py-8"><i class="fa-regular fa-file-lines text-3xl block mb-2"></i><span>Belum ada laporan</span></div>`;
          return;
        }

        const userNik = window._user?.nik || '';
        const userNama = window._user?.nama || '';

        allReports = reports.filter(r => {
          const reportNik = String(r.nik || '').trim();
          const reportNama = String(r.nama || r.pelapor || '').toLowerCase().trim();
          if (userNik && reportNik) return reportNik === userNik;
          if (userNama && reportNama) return reportNama === userNama;
          return false;
        });

        applyFilter();

      } catch (err) {
        console.error('Load history error:', err);
        list.innerHTML = `<div class="text-center text-red-400 py-8">Terjadi kesalahan: ${err.message}</div>`;
      }
    }

    // =============================================
    // 3. RENDER REPORTS
    // =============================================
    function renderReports(reports) {
      const list = document.getElementById('historyList');
      if (!reports.length) {
        list.innerHTML = `<div class="text-center text-gray-400 py-8"><i class="fa-regular fa-file-lines text-3xl block mb-2"></i><span>Tidak ada laporan yang cocok</span></div>`;
        return;
      }

      let html = '';
      reports.forEach(r => {
        const status = r.status || 'OPEN';
        let statusClass = 'status-open';
        if (status === 'DONE') statusClass = 'status-done';
        else if (status === 'PROGRESS') statusClass = 'status-progress';

        const foto = r.foto || '';
        const fotoHtml = foto ? `<img src="${foto}" alt="foto" />` : `<i class="fa-regular fa-image"></i>`;
        const tanggal = r.tanggal || r.createdAt || '';
        const formattedDate = tanggal ? new Date(tanggal).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';

        html += `
          <div class="history-item border border-gray-100 rounded-2xl p-4 flex items-center justify-between shadow-sm bg-white mb-3" data-report-id="${String(r.id || r.reportId || r.report_id || r.ID || '')}">
            <div class="space-y-1 flex-1 pr-2">
              <span class="status-badge ${statusClass}">${status}</span>
              <h4 class="font-bold text-sm text-gray-800 flex items-center gap-1.5 pt-1">
                <i class="fa-solid fa-building text-[#1e5eff] text-xs"></i> ${r.kategori || '-'}
              </h4>
              <p class="text-xs text-gray-500 font-medium">📍 ${r.lokasi || '-'}</p>
              <p class="text-[11px] text-gray-400 flex items-center gap-1">
                <i class="fa-regular fa-calendar"></i> ${formattedDate || '-'}
              </p>
            </div>
            <div class="flex items-center gap-2">
              <div class="img-thumb" data-foto="${foto}" onclick="openPhoto(this)">
                ${fotoHtml}
              </div>
              <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
      focusTargetReport();
    }

    function focusTargetReport() {
      const targetId = new URLSearchParams(window.location.search).get('reportId');
      if (!targetId) return;

      const cards = [...document.querySelectorAll('.history-item')];
      const target = cards.find(card =>
        String(card.dataset.reportId || '').trim().toLowerCase() ===
        String(targetId).trim().toLowerCase()
      );

      if (!target) return;

      target.classList.add('target-report');
      setTimeout(() => {
        target.scrollIntoView({ behavior:'smooth', block:'center' });
      }, 180);

      setTimeout(() => target.classList.remove('target-report'), 4200);

      // Bersihkan query agar refresh berikutnya tidak terus menyorot kartu.
      try {
        history.replaceState({}, '', 'user-history.html');
      } catch (e) {}
    }

    // =============================================
    // 4. COMBINED SEARCH & STATUS FILTER SYSTEM
    // =============================================
    function applyFilter() {
      const keyword = document.getElementById('searchHistory').value.toLowerCase().trim();
      
      let filtered = allReports;

      if (currentStatusFilter !== 'ALL') {
        filtered = filtered.filter(r => (r.status || '').toUpperCase() === currentStatusFilter);
      }

      if (keyword) {
        filtered = filtered.filter(r =>
          (r.lokasi || '').toLowerCase().includes(keyword) ||
          (r.kategori || '').toLowerCase().includes(keyword) ||
          (r.deskripsi || '').toLowerCase().includes(keyword)
        );
      }

      renderReports(filtered);
    }

    document.getElementById('searchHistory').addEventListener('input', applyFilter);

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        
        currentStatusFilter = this.getAttribute('data-status');
        applyFilter();
      });
    });

    // =============================================
    // 5. PHOTO MODAL
    // =============================================
    window.openPhoto = function(el) {
      const foto = el.dataset.foto;
      if (!foto) {
        alert('Tidak ada foto untuk laporan ini');
        return;
      }
      const modal = document.getElementById('photoModal');
      const img = document.getElementById('photoPreview');
      img.src = foto;
      modal.style.display = 'flex';
      try {
        const bsModal = new bootstrap.Modal(modal);
        bsModal.show();
      } catch(e) {
        modal.style.display = 'flex';
      }
    };

    document.getElementById('photoModal').addEventListener('click', function(e) {
      if (e.target === this) {
        this.style.display = 'none';
      }
    });

    // =============================================
    // 6. NAVIGASI, NOTIF & MODERN TOAST LOGOUT
    // =============================================
    document.getElementById('navReport').addEventListener('click', function(e) { e.preventDefault(); window.location.href = 'user-report.html'; });
    document.getElementById('navHistory').addEventListener('click', function(e) { e.preventDefault(); window.location.href = 'user-history.html'; });
    document.getElementById('notifBtn').addEventListener('click', function() {
      window.location.href = 'user-report.html#notifications';
    });

    const logoutOverlay = document.getElementById('logoutOverlay');
    const logoutToast = document.getElementById('logoutToast');

    function openLogoutToast() {
      logoutOverlay.classList.remove('opacity-0', 'pointer-events-none');
      logoutToast.classList.add('show');
    }

    function closeLogoutToast() {
      logoutOverlay.classList.add('opacity-0', 'pointer-events-none');
      logoutToast.classList.remove('show');
    }

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      openLogoutToast();
    });

    document.getElementById('cancelLogoutBtn').addEventListener('click', closeLogoutToast);
    logoutOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeLogoutToast();
    });

    document.getElementById('confirmLogoutBtn').addEventListener('click', function() {
      // Menambahkan feedback loading saat keluar
      this.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> <span>Memproses...</span>';
      this.disabled = true;

      setTimeout(() => {
        if (window.auth && typeof window.auth.logout === 'function') { window.auth.logout(); return; }
        try {
          if (window.BCS && BCS.Storage && typeof BCS.Storage.removeSession === 'function') { BCS.Storage.removeSession(); }
        } catch(e) {}
        const keys = ['BCS_SESSION', 'token', 'user', 'nik', 'role', 'session_timestamp', 'BCS_REMEMBER'];
        keys.forEach(key => { localStorage.removeItem(key); sessionStorage.removeItem(key); });
        window.location.href = 'login.html';
      }, 600);
    });

    // INIT
    loadUser();
    loadHistory();

  })();
</script>
  <script type="module" src="assets/js/modules/firebase-config.js"></script>
</body>
</html>
