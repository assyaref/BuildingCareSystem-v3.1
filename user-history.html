<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>History - Building Care System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Bootstrap 5 CSS (untuk modal) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; background:#f3f4f6; }
    .app-card { width:100%; max-width:420px; height:100vh; max-height:900px; background:#1e5eff; border-radius:28px; box-shadow:0 20px 60px rgba(30,94,255,0.25); display:flex; flex-direction:column; overflow:hidden; margin:0 auto; }
    @media (max-width:480px){ .app-card { border-radius:0; max-height:100vh; } }
    .scroll-content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; -ms-overflow-style:none; scrollbar-width:none; }
    .scroll-content::-webkit-scrollbar { display:none; }
    .bottom-nav { background:#fff; border-top:1px solid rgba(0,0,0,0.05); padding:10px 0 12px; display:grid; grid-template-columns:1fr 1fr; text-align:center; flex-shrink:0; }
    .bottom-nav a { text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; font-weight:700; transition:color 0.2s; }
    .bottom-nav a i { font-size:20px; }

    .status-badge { font-size:10px; font-weight:700; padding:2px 10px; border-radius:6px; display:inline-block; letter-spacing:0.3px; }
    .status-done { background:#dcfce7; color:#16a34a; }
    .status-progress { background:#fef3c7; color:#d97706; }
    .status-open { background:#fee2e2; color:#dc2626; }

    .history-item { transition:all 0.2s; cursor:default; -webkit-tap-highlight-color:transparent; }
    .history-item:active { transform:scale(0.99); }

    .img-thumb { width:60px; height:60px; background:#f3f4f6; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#d1d5db; font-size:22px; flex-shrink:0; overflow:hidden; cursor:pointer; }
    .img-thumb img { width:100%; height:100%; object-fit:cover; }

    .search-wrap { background:#f3f4f6; border-radius:14px; display:flex; align-items:center; padding:0 16px; gap:12px; flex:1; }
    .search-wrap input { background:transparent; border:none; width:100%; padding:12px 0; font-size:14px; color:#1f2937; }
    .search-wrap input::placeholder { color:#9ca3af; font-weight:400; }
    .search-wrap input:focus { outline:none; }
    .filter-btn { background:#eff3ff; color:#1e5eff; width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:18px; border:none; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
    .filter-btn:active { background:#dbe3ff; transform:scale(0.95); }
  </style>
</head>
<body>
<div class="app-card">
  <!-- Header -->
  <div class="flex-shrink-0" style="background:#1e5eff;">
    <div style="height:6px;"></div>
    <div class="px-5 pb-4 pt-2 text-center text-white">
      <h2 class="font-bold text-lg m-0">Riwayat Laporan</h2>
      <p class="text-xs text-blue-200 m-0" id="totalReports">0 laporan</p>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-content bg-white rounded-t-2xl px-5 pt-5 pb-4">
    <!-- Search -->
    <div class="flex gap-3 mb-5">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        <input type="text" id="searchHistory" placeholder="Cari lokasi atau kategori..." />
      </div>
      <button class="filter-btn" id="filterBtn"><i class="fa-solid fa-sliders"></i></button>
    </div>

    <!-- List -->
    <div id="historyList">
      <!-- Akan diisi oleh userHistory.js -->
      <div class="text-center text-gray-400 py-8">
        <i class="fa-regular fa-clock text-3xl block mb-2"></i>
        <span>Memuat data...</span>
      </div>
    </div>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="#" class="text-gray-400" id="navReport"><i class="fa-solid fa-file-invoice"></i><span>Report</span></a>
    <a href="#" class="text-[#1e5eff]" id="navHistory"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
  </div>
</div>

<!-- Modal Preview Foto (Bootstrap) -->
<div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:transparent;border:none;">
      <div class="modal-body p-0 text-center">
        <img id="photoPreview" src="" alt="Foto Laporan" class="img-fluid rounded" style="max-height:80vh;" />
      </div>
    </div>
  </div>
</div>

<!-- ============================================ -->
<!-- SCRIPT ENTERPRISE + jQuery (untuk userHistory) -->
<!-- ============================================ -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="config/config.js"></script>
<script src="assets/js/core/session.js"></script>
<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/modules/userHistory.js"></script>

<script>
  (function() {
    'use strict';

    // Inisialisasi modul setelah DOM ready
    $(document).ready(function() {
      if (typeof UserHistoryModule !== 'undefined' && UserHistoryModule.init) {
        UserHistoryModule.init();
      } else {
        console.error('UserHistoryModule tidak ditemukan!');
      }
    });

    // Navigasi ke Report
    document.getElementById('navReport').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'user-report.html';
    });

    // Navigasi ke History (refresh)
    document.getElementById('navHistory').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'user-history.html';
    });

    // Filter button (opsional – bisa dipakai untuk filter tambahan)
    document.getElementById('filterBtn').addEventListener('click', function() {
      // Contoh sederhana: minta input status
      const status = prompt('Filter status (DONE / PROGRESS / OPEN) atau kosongkan untuk reset');
      if (status === null) return;
      const val = status.trim().toUpperCase();
      if (!val) {
        // reset dengan memicu search kosong
        document.getElementById('searchHistory').value = '';
        document.getElementById('searchHistory').dispatchEvent(new Event('keyup'));
        return;
      }
      // Kita bisa tambahkan logika filter di userHistory.js,
      // tetapi untuk demo, kita trigger pencarian dengan keyword status
      document.getElementById('searchHistory').value = val;
      document.getElementById('searchHistory').dispatchEvent(new Event('keyup'));
    });
  })();
</script>
</body>
</html>
