<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Building Care - Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Mobile CSS -->
    <link rel="stylesheet" href="./assets/css/mobile/mobile.css">
    <link rel="stylesheet" href="./assets/css/mobile/header.css">
    <link rel="stylesheet" href="./assets/css/mobile/button.css">
    <link rel="stylesheet" href="./assets/css/mobile/form.css">
    <link rel="stylesheet" href="./assets/css/mobile/report.css">
    <link rel="stylesheet" href="./assets/css/mobile/navigation.css">
</head>
<body>

    <!-- ====== HEADER ====== -->
    <header class="mobile-header">
        <div class="mobile-header-left">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div>
                <h4 id="userName">Halo 👋</h4>
                <small id="userDept"></small>
            </div>
        </div>
        <div class="mobile-header-right">
            <button class="header-notification" id="notificationBtn" title="Notifikasi">
                <i class="bi bi-bell"></i>
                <span class="notification-badge">3</span>
            </button>
        </div>
    </header>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="mobile-content">
        
        <!-- ====== REPORT CARD ====== -->
        <section class="mobile-card report-card">
            <h5 class="card-title">Buat Laporan Kerusakan</h5>

            <!-- ====== LOKASI ====== -->
            <div class="form-group">
                <label class="form-label">Lokasi Kerusakan</label>
                <input id="lokasi" class="form-input" placeholder="Contoh : Ruang Meeting">
            </div>

            <!-- ====== KATEGORI ====== -->
            <div class="form-group">
                <label class="form-label">Kategori</label>
                <div class="category-grid" id="categoryGrid">
                    <div class="category-card" data-value="LISTRIK">
                        <i class="bi bi-lightning-charge"></i>
                        <span>LISTRIK</span>
                    </div>
                    <div class="category-card" data-value="AC">
                        <i class="bi bi-snow"></i>
                        <span>AC</span>
                    </div>
                    <div class="category-card" data-value="GEDUNG">
                        <i class="bi bi-building"></i>
                        <span>GEDUNG</span>
                    </div>
                    <div class="category-card" data-value="AIR">
                        <i class="bi bi-droplet"></i>
                        <span>AIR</span>
                    </div>
                </div>
            </div>

            <!-- ====== PRIORITAS ====== -->
            <div class="form-group">
                <label class="form-label">Prioritas</label>
                <div class="priority-grid" id="priorityGrid">
                    <div class="priority-card active" data-priority="NORMAL">
                        🟢 NORMAL
                    </div>
                    <div class="priority-card" data-priority="HIGH">
                        🟡 HIGH
                    </div>
                    <div class="priority-card" data-priority="URGENT">
                        🔴 URGENT
                    </div>
                </div>
            </div>

            <!-- ====== DESKRIPSI ====== -->
            <div class="form-group">
                <label class="form-label">Deskripsi Kerusakan</label>
                <textarea id="deskripsi" maxlength="500" class="form-input" placeholder="Jelaskan kerusakan yang ditemukan..."></textarea>
                <small class="char-counter">
                    <span id="charCount">0</span>/500 karakter
                </small>
            </div>

            <!-- ====== FOTO ====== -->
            <div class="form-group">
                <label class="form-label">Foto Kerusakan</label>
                <div class="photo-card" id="photoCard">
                    <input id="photo" type="file" accept="image/*" capture="environment">
                    <i class="bi bi-camera-fill"></i>
                    <p>Ambil Foto</p>
                    <small>JPG / PNG Maksimal 5 MB</small>
                </div>
            </div>

            <!-- ====== PREVIEW ====== -->
            <div class="form-group">
                <label class="form-label">Preview Foto</label>
                <div class="preview-wrapper" id="previewWrapper">
                    <img id="previewImage" class="preview-image d-none">
                    <div id="previewPlaceholder" class="preview-placeholder">
                        <i class="bi bi-image"></i>
                        <span>Belum ada foto</span>
                    </div>
                    <button class="photo-remove d-none" id="photoRemove" title="Hapus foto">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- ====== SUBMIT BUTTON (STICKY) ====== -->
    <div class="submit-wrapper">
        <button id="submitReport" class="btn-submit">
            <i class="bi bi-send-fill"></i> Kirim Report
        </button>
    </div>

    <!-- ============================================
    BOTTOM NAVIGATION
    ============================================ -->
    <nav class="bottom-navigation">

        <a href="user-report.html" class="nav-item active">
            <i class="bi bi-house-door-fill"></i>
            <span class="nav-label">Report</span>
        </a>

        <a href="user-history.html" class="nav-item">
            <i class="bi bi-clock-history"></i>
            <span class="nav-label">History</span>
        </a>

        <div class="nav-center">
            <button class="nav-fab" id="fabReport" title="Buat Laporan Baru">
                <i class="bi bi-plus-lg"></i>
            </button>
        </div>

        <a href="#" class="nav-item" id="navWo">
            <i class="bi bi-list-task"></i>
            <span class="nav-label">WO</span>
            <span class="nav-badge">3</span>
        </a>

        <a href="user-profile.html" class="nav-item">
            <i class="bi bi-person-circle"></i>
            <span class="nav-label">Profile</span>
        </a>

    </nav>

    <!-- ====== SCRIPTS ====== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Core -->
    <script src="./config/config.js"></script>
    <script src="./assets/js/core/app.js"></script>
    <script src="./assets/js/core/api.js"></script>
    <script src="./assets/js/core/session.js"></script>
    
    <!-- Modules -->
    <script src="./assets/js/modules/auth.js"></script>
    <script src="./assets/js/modules/userReport.js"></script>
    
    <!-- Mobile UI -->
    <script src="./assets/js/mobile/mobile-ui.js"></script>

</body>
</html>
