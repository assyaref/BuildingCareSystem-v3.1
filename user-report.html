<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Building Care - Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/user.css">
</head>
<body>

<div class="user-header">
    <h4 id="userName">Halo 👋</h4>
    <small id="userDept"></small>
</div>

<div class="container">
    <div class="user-card">
        <h5 class="mb-4 fw-bold">Buat Laporan Kerusakan</h5>

        <div class="mb-4">
            <label class="form-label">Lokasi Kerusakan</label>
            <input id="lokasi" class="form-control" placeholder="Contoh : Ruang Meeting">
        </div>

        <div class="mb-4">
            <label class="form-label">Kategori</label>
            <div class="category-grid">
                <div class="category-item" data-value="LISTRIK">
                    <i class="bi bi-lightning-charge"></i> LISTRIK
                </div>
                <div class="category-item" data-value="AC">
                    <i class="bi bi-snow"></i> AC
                </div>
                <div class="category-item" data-value="GEDUNG">
                    <i class="bi bi-building"></i> GEDUNG
                </div>
                <div class="category-item" data-value="AIR">
                    <i class="bi bi-droplet"></i> AIR
                </div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Prioritas</label>
            <div class="priority-item active" data-priority="NORMAL">🟢 NORMAL</div>
            <div class="priority-item" data-priority="HIGH">🟡 HIGH</div>
            <div class="priority-item" data-priority="URGENT">🔴 URGENT</div>
        </div>

        <div class="mb-4">
            <label class="form-label">Deskripsi Kerusakan</label>
            <textarea id="deskripsi" maxlength="500" class="form-control" placeholder="Jelaskan kerusakan yang ditemukan..."></textarea>
            <small class="text-muted">
                <span id="charCount">0</span>/500 karakter
            </small>
        </div>

        <div class="mb-4">
            <label class="form-label">Foto Kerusakan</label>
            <div class="photo-card">
                <input id="photo" type="file" accept="image/*" capture="environment" class="form-control">
                <i class="bi bi-camera-fill"></i>
                <p>Ambil Foto</p>
                <small>JPG / PNG Maksimal 5 MB</small>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Preview Foto</label>
            <div class="preview-wrapper">
                <img id="previewImage" class="preview-image d-none">
                <div id="previewPlaceholder">
                    <i class="bi bi-image" style="font-size:50px; color:#CBD5E1"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="submit-wrapper">
    <button id="submitReport" class="btn btn-primary w-100">
        <i class="bi bi-send-fill"></i> Kirim Report
    </button>
</div>

<div class="bottom-nav">
    <a href="user-report.html" class="active">
        <i class="bi bi-house"></i> Report
    </a>
    <a href="user-history.html">
        <i class="bi bi-clock-history"></i> History
    </a>
    <a href="user-profile.html">
        <i class="bi bi-person"></i> Profile
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="./config/config.js"></script>

<script src="./assets/js/core/app.js"></script>
<script src="./assets/js/core/api.js"></script>
<script src="./assets/js/core/session.js"></script>

<!-- WAJIB -->
<script src="./assets/js/modules/auth.js"></script>

<!-- USER REPORT -->
<script src="./assets/js/modules/userReport.js"></script>
</body>
</html>
