<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Report - Building Care System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; background:#f3f4f6; }
    .app-card { width:100%; max-width:420px; height:100vh; max-height:900px; background:#1e5eff; border-radius:28px; box-shadow:0 20px 60px rgba(30,94,255,0.25); display:flex; flex-direction:column; overflow:hidden; margin:0 auto; }
    @media (max-width:480px){ .app-card { border-radius:0; max-height:100vh; } }
    .scroll-content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; -ms-overflow-style:none; scrollbar-width:none; }
    .scroll-content::-webkit-scrollbar { display:none; }
    .bottom-nav { background:#fff; border-top:1px solid rgba(0,0,0,0.05); padding:10px 0 12px; display:grid; grid-template-columns:1fr 1fr; text-align:center; flex-shrink:0; }
    .bottom-nav a { text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; font-weight:700; transition:color 0.2s; }
    .bottom-nav a i { font-size:20px; }
    .cat-card { transition:all 0.2s; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; border:2px solid #e5e7eb; border-radius:14px; padding:12px; text-align:center; background:#fff; }
    .cat-card:active { transform:scale(0.97); }
    .cat-card.selected { border-color:#1e5eff; background:#f0f4ff; color:#1e5eff; }
    .drop-zone { border:2px dashed #d1d5db; border-radius:14px; padding:20px; background:#fafbfc; text-align:center; position:relative; transition:all 0.2s; min-height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .drop-zone.has-image { border-color:#1e5eff; background:#f0f4ff; padding:8px; }
    .drop-zone .preview-img { max-width:100%; max-height:200px; border-radius:10px; object-fit:contain; }
    .drop-zone .remove-photo { position:absolute; top:8px; right:8px; background:rgba(239,68,68,0.9); color:#fff; border:none; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
    .submit-btn { width:100%; background:#1e5eff; color:#fff; padding:16px; border-radius:14px; font-weight:700; font-size:15px; border:none; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:background 0.2s; }
    .submit-btn:active { transform:scale(0.97); background:#1a4fd6; }
    .submit-btn:disabled { opacity:0.6; pointer-events:none; }
    input:focus, textarea:focus { outline:none; border-color:#1e5eff !important; box-shadow:0 0 0 3px rgba(30,94,255,0.12); }
    .char-counter { font-size:11px; color:#9ca3af; margin-top:4px; text-align:right; }
    .avatar-circle { width:36px; height:36px; border-radius:50%; background:#4b7bec; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
    .header-btn { background:transparent; border:none; color:#fff; cursor:pointer; padding:4px; font-size:18px; transition:opacity 0.2s; }
    .header-btn:hover { opacity:0.8; }
    .header-btn:active { transform:scale(0.95); }
    .photo-btn { padding:12px; border-radius:14px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; -webkit-tap-highlight-color:transparent; }
    .photo-btn:active { transform:scale(0.96); }
    .photo-btn.primary { background:#1e5eff; color:#fff; }
    .photo-btn.secondary { background:#f3f4f6; color:#4b5563; }
    #priorityBadge { transition: all 0.2s; }

    /* Custom style untuk Toast SweetAlert2 di tengah */
    .swal2-popup.swal2-toast {
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 20px !important;
      border-radius: 20px !important;
      min-width: 280px !important;
      max-width: 90% !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15) !important;
      background: #ffffff !important;
    }
    .swal2-popup.swal2-toast .swal2-title {
      font-size: 16px !important;
      font-weight: 600 !important;
      margin-top: 8px !important;
    }
    .swal2-popup.swal2-toast .swal2-icon {
      margin: 0 !important;
      width: 56px !important;
      height: 56px !important;
      font-size: 24px !important;
    }
    .swal2-popup.swal2-toast .swal2-icon.swal2-success {
      border-color: #22c55e !important;
      background: #dcfce7 !important;
    }
    .swal2-popup.swal2-toast .swal2-icon.swal2-success .swal2-success-ring {
      border-color: #22c55e !important;
    }
    .swal2-popup.swal2-toast .swal2-icon.swal2-error {
      border-color: #ef4444 !important;
      background: #fee2e2 !important;
    }
    .swal2-popup.swal2-toast .swal2-icon.swal2-warning {
      border-color: #f59e0b !important;
      background: #fef3c7 !important;
    }
    .swal2-popup.swal2-toast .swal2-icon.swal2-info {
      border-color: #3b82f6 !important;
      background: #dbeafe !important;
    }

    /* Logout modal lebih berwarna */
    .swal2-popup {
      border-radius: 24px !important;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15) !important;
      padding: 32px 24px !important;
    }
    .swal2-title {
      font-weight: 700 !important;
      font-size: 22px !important;
    }
    .swal2-html-container {
      font-size: 15px !important;
      color: #4b5563 !important;
    }
    .swal2-confirm {
      background: linear-gradient(145deg, #ef4444, #dc2626) !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 12px 32px !important;
      font-weight: 600 !important;
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3) !important;
      transition: all 0.2s !important;
    }
    .swal2-confirm:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 12px 32px rgba(239, 68, 68, 0.4) !important;
    }
    .swal2-cancel {
      background: #e5e7eb !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 12px 32px !important;
      font-weight: 600 !important;
      color: #374151 !important;
      transition: all 0.2s !important;
    }
    .swal2-cancel:hover {
      background: #d1d5db !important;
    }
    .swal2-icon.swal2-question {
      border-color: #3b82f6 !important;
      background: #dbeafe !important;
    }
    .swal2-icon.swal2-question .swal2-icon-content {
      color: #3b82f6 !important;
    }
  </style>
</head>
<body>
<div class="app-card">
  <!-- Header -->
  <div class="flex-shrink-0" style="background:#1e5eff;">
    <div style="height:6px;"></div>
    <div class="px-5 pb-4 pt-2 flex items-center justify-between text-white">
      <div class="flex items-center gap-3">
        <div class="avatar-circle" id="userAvatar">U</div>
        <div>
          <h2 class="font-bold text-lg flex items-center gap-1.5 m-0" id="userName">Halo, User 👋</h2>
          <p class="text-xs text-blue-200 m-0" id="userDept">Departemen</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button class="header-btn" id="notifBtn">
          <i class="fa-solid fa-bell"></i>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center" style="position:relative; top:-10px; right:6px;">3</span>
        </button>
        <button class="header-btn" id="logoutBtn" title="Keluar">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="scroll-content bg-white rounded-t-2xl px-5 pt-5 pb-4">
    <!-- Lokasi -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Lokasi Kerusakan</label>
      <input type="text" id="lokasi" placeholder="Contoh : Ruang Meeting" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm transition" />
    </div>

    <!-- Departemen -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Departemen</label>
      <input type="text" id="departemen" placeholder="Contoh : General Affair" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm transition" />
    </div>

    <!-- Kategori -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Kategori Kerusakan</label>
      <div class="grid grid-cols-2 gap-3" id="categoryGrid">
        <div class="cat-card selected" data-value="LISTRIK"><i class="fa-solid fa-bolt text-xl block"></i><span class="text-xs font-bold">LISTRIK</span></div>
        <div class="cat-card" data-value="AC"><i class="fa-solid fa-snowflake text-xl block"></i><span class="text-xs font-bold">AC</span></div>
        <div class="cat-card" data-value="KONDISI GEDUNG" style="grid-column:span 2;"><i class="fa-solid fa-building text-xl block"></i><span class="text-xs font-bold">KONDISI GEDUNG</span></div>
      </div>
      <input type="hidden" id="selectedCategory" value="LISTRIK" />
    </div>

    <!-- Prioritas -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Prioritas</label>
      <div id="priorityBadge" class="text-sm font-bold px-4 py-2 rounded-lg mb-2 inline-block" style="background:#dcfce7; color:#16a34a;">
        NORMAL
      </div>
      <select id="prioritySelect" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white">
        <option value="NORMAL" style="color:#16a34a;">🟢 NORMAL</option>
        <option value="HIGH" style="color:#d97706;">🟡 HIGH</option>
        <option value="URGENT" style="color:#dc2626;">🔴 URGENT</option>
      </select>
    </div>

    <!-- Deskripsi -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Deskripsi Kerusakan</label>
      <textarea id="deskripsi" rows="3" maxlength="500" placeholder="Jelaskan kerusakan secara detail..." class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm resize-none transition"></textarea>
      <div class="char-counter"><span id="charCount">0</span> / 500 karakter</div>
    </div>

    <!-- Foto -->
    <div class="mb-5">
      <label class="block text-sm font-bold text-gray-800 mb-1.5">Foto Kerusakan</label>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <button id="cameraBtn" class="photo-btn primary"><i class="fa-solid fa-camera"></i> Ambil Foto</button>
        <button id="galleryBtn" class="photo-btn secondary"><i class="fa-solid fa-image"></i> Galeri</button>
      </div>
      <input type="file" id="photo" accept="image/*" style="display:none;" />
      <div id="previewWrapper" class="drop-zone" style="cursor:pointer;">
        <div id="previewPlaceholder">
          <i class="fa-regular fa-image text-3xl text-gray-300"></i>
          <p class="text-sm text-gray-400 mt-1">Klik untuk pilih foto</p>
        </div>
        <img id="previewImage" class="preview-img" style="display:none;" />
        <button id="photoRemove" class="remove-photo" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitReport"><i class="fa-solid fa-paper-plane text-sm"></i> Kirim Report</button>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="#" class="text-[#1e5eff]" id="navReport"><i class="fa-solid fa-file-invoice"></i><span>Report</span></a>
    <a href="#" class="text-gray-400" id="navHistory"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
  </div>
</div>

<!-- ============================================ -->
<!-- SCRIPT ENTERPRISE                            -->
<!-- ============================================ -->
<script src="config/config.js"></script>
<script src="assets/js/core/session.js"></script>
<script src="assets/js/core/app.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/modules/auth.js"></script>

<script>
  (function() {
    'use strict';

    // =============================================
    // Toast Custom Function (di tengah, berwarna)
    // =============================================
    function showCustomToast(icon, title, timer = 2500) {
      const iconMap = {
        'success': { color: '#22c55e', bg: '#dcfce7' },
        'error': { color: '#ef4444', bg: '#fee2e2' },
        'warning': { color: '#f59e0b', bg: '#fef3c7' },
        'info': { color: '#3b82f6', bg: '#dbeafe' }
      };
      const style = iconMap[icon] || iconMap['info'];

      Swal.fire({
        toast: true,
        position: 'center',
        icon: icon,
        title: title,
        showConfirmButton: false,
        timer: timer,
        timerProgressBar: true,
        background: '#ffffff',
        customClass: {
          popup: 'swal2-toast',
          timerProgressBar: 'bg-' + (icon === 'success' ? 'success' : icon === 'error' ? 'danger' : icon === 'warning' ? 'warning' : 'info')
        }
      });
    }

    // =============================================
    // 1. LOAD USER DATA
    // =============================================
    function loadUser() {
      try {
        const session = BCS.Storage.getSession();
        const user = session?.user || {};
        const nama = user.nama || user.name || 'User';
        const dept = user.departemen || user.department || '';
        const nik = session?.nik || user.nik || '';

        document.getElementById('userName').textContent = `Halo ${nama} 👋`;
        document.getElementById('userDept').textContent = dept || nik || 'Building Care';
        const avatar = document.getElementById('userAvatar');
        avatar.textContent = nama.charAt(0).toUpperCase() || 'U';

        const deptInput = document.getElementById('departemen');
        if (deptInput && dept) {
          deptInput.value = dept;
        }
      } catch (e) {
        console.warn('Gagal load user:', e);
      }
    }

    // =============================================
    // 2. PRIORITAS BADGE
    // =============================================
    const prioritySelect = document.getElementById('prioritySelect');
    const priorityBadge = document.getElementById('priorityBadge');

    const priorityColors = {
      'NORMAL': { bg: '#dcfce7', text: '#16a34a', label: 'NORMAL' },
      'HIGH':   { bg: '#fef3c7', text: '#d97706', label: 'HIGH' },
      'URGENT': { bg: '#fee2e2', text: '#dc2626', label: 'URGENT' }
    };

    function updatePriorityBadge(value) {
      const color = priorityColors[value] || priorityColors['NORMAL'];
      priorityBadge.textContent = color.label;
      priorityBadge.style.backgroundColor = color.bg;
      priorityBadge.style.color = color.text;
    }

    prioritySelect.addEventListener('change', function() {
      updatePriorityBadge(this.value);
    });
    updatePriorityBadge(prioritySelect.value);

    // =============================================
    // 3. KATEGORI
    // =============================================
    const categoryCards = document.querySelectorAll('.cat-card');
    const hiddenCategory = document.getElementById('selectedCategory');

    function updateCategoryUI(value) {
      categoryCards.forEach(card => {
        const val = card.dataset.value;
        if (val === value) {
          card.classList.add('selected');
          card.classList.remove('border-gray-200', 'text-gray-600');
          card.classList.add('border-[#1e5eff]', 'bg-blue-50/30', 'text-[#1e5eff]');
        } else {
          card.classList.remove('selected', 'border-[#1e5eff]', 'bg-blue-50/30', 'text-[#1e5eff]');
          card.classList.add('border-gray-200', 'text-gray-600');
        }
      });
      hiddenCategory.value = value;
    }

    categoryCards.forEach(card => {
      card.addEventListener('click', function() {
        updateCategoryUI(this.dataset.value);
      });
    });
    updateCategoryUI('LISTRIK');

    // =============================================
    // 4. KAMERA & GALERI
    // =============================================
    const photoInput = document.getElementById('photo');
    const cameraBtn  = document.getElementById('cameraBtn');
    const galleryBtn = document.getElementById('galleryBtn');

    cameraBtn.addEventListener('click', function(e) {
      e.preventDefault();
      photoInput.setAttribute('capture', 'environment');
      photoInput.click();
      setTimeout(() => photoInput.removeAttribute('capture'), 100);
    });

    galleryBtn.addEventListener('click', function(e) {
      e.preventDefault();
      photoInput.removeAttribute('capture');
      photoInput.click();
    });

    // =============================================
    // 5. PREVIEW FOTO
    // =============================================
    const previewImage = document.getElementById('previewImage');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const previewWrapper = document.getElementById('previewWrapper');
    const removePhotoBtn = document.getElementById('photoRemove');

    let currentFile = null;

    function showPreview(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewImage.style.display = 'block';
        previewPlaceholder.style.display = 'none';
        previewWrapper.classList.add('has-image');
        removePhotoBtn.style.display = 'flex';
        currentFile = file;
      };
      reader.readAsDataURL(file);
    }

    function clearPreview() {
      previewImage.src = '';
      previewImage.style.display = 'none';
      previewPlaceholder.style.display = 'flex';
      previewWrapper.classList.remove('has-image');
      removePhotoBtn.style.display = 'none';
      photoInput.value = '';
      currentFile = null;
    }

    photoInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          showCustomToast('error', 'Ukuran foto maksimal 5 MB');
          this.value = '';
          return;
        }
        showPreview(file);
      }
    });

    removePhotoBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      clearPreview();
    });

    previewWrapper.addEventListener('click', function(e) {
      if (e.target.closest('#photoRemove')) return;
      galleryBtn.click();
    });

    // =============================================
    // 6. SUBMIT REPORT
    // =============================================
    const submitBtn = document.getElementById('submitReport');

    async function submitReport() {
      // Validasi
      const lokasi = document.getElementById('lokasi').value.trim();
      if (!lokasi) {
        showCustomToast('warning', 'Lokasi kerusakan wajib diisi');
        document.getElementById('lokasi').focus();
        return;
      }

      const departemen = document.getElementById('departemen').value.trim();
      if (!departemen) {
        showCustomToast('warning', 'Departemen wajib diisi');
        document.getElementById('departemen').focus();
        return;
      }

      const kategori = document.getElementById('selectedCategory').value;
      if (!kategori) {
        showCustomToast('warning', 'Pilih kategori kerusakan');
        return;
      }

      const deskripsi = document.getElementById('deskripsi').value.trim();
      if (!deskripsi || deskripsi.length < 5) {
        showCustomToast('warning', 'Deskripsi wajib diisi minimal 5 karakter');
        document.getElementById('deskripsi').focus();
        return;
      }

      const prioritas = document.getElementById('prioritySelect').value;

      // Ambil data user dari Session
      const session = BCS.Storage.getSession();
      const user = session?.user || {};
      const nama = user.nama || user.name || 'User';
      const nik = session?.nik || user.nik || '';

      // Konversi foto ke base64
      let photoBase64 = '';
      let filename = '';
      if (currentFile) {
        try {
          const reader = new FileReader();
          const result = await new Promise((resolve, reject) => {
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(currentFile);
          });
          photoBase64 = result;
          filename = currentFile.name;
        } catch (e) {
          showCustomToast('error', 'Gagal membaca foto: ' + e.message);
          return;
        }
      }

      // Buat payload
      const payload = {
        nama: nama,
        nik: nik,
        departemen: departemen,
        lokasi: lokasi,
        kategori: kategori,
        prioritas: prioritas,
        deskripsi: deskripsi,
        photo: photoBase64,
        filename: filename
      };

      console.log('📤 Payload:', payload);

      // Nonaktifkan tombol & tampilkan spinner
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengirim...';

      try {
        const response = await BCS.Api.post('saveReport', payload);
        console.log('📥 Response:', response);

        if (response && response.success) {
          // ✅ Toast tengah berwarna hijau
          showCustomToast('success', '✅ Report berhasil dikirim!');

          // Reset form
          document.getElementById('lokasi').value = '';
          document.getElementById('departemen').value = '';
          document.getElementById('deskripsi').value = '';
          document.getElementById('charCount').textContent = '0';
          clearPreview();
          updateCategoryUI('LISTRIK');
          prioritySelect.value = 'NORMAL';
          updatePriorityBadge('NORMAL');
        } else {
          showCustomToast('error', '❌ Gagal mengirim report: ' + (response?.message || 'Unknown error'));
        }
      } catch (err) {
        console.error('Submit error:', err);
        showCustomToast('error', '❌ Terjadi kesalahan: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane text-sm"></i> Kirim Report';
      }
    }

    submitBtn.addEventListener('click', submitReport);

    // =============================================
    // 7. CHAR COUNTER
    // =============================================
    document.getElementById('deskripsi').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length;
    });

    // =============================================
    // 8. NAVIGASI
    // =============================================
    document.getElementById('navHistory').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'user-history.html';
    });

    document.getElementById('navReport').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'user-report.html';
    });

    document.getElementById('notifBtn').addEventListener('click', function() {
      showCustomToast('info', 'Anda memiliki 3 notifikasi');
    });

    // =============================================
    // 9. LOGOUT - LEBIH BAGUS & BERWARNA
    // =============================================
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();

      Swal.fire({
        title: '🚪 Keluar dari Sistem',
        text: 'Apakah Anda yakin ingin keluar?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#6b7280',
        confirmButtonText: 'Ya, Keluar',
        cancelButtonText: 'Batal',
        reverseButtons: true,
        customClass: {
          popup: 'rounded-4',
          confirmButton: 'btn btn-danger px-5 py-2 fw-bold',
          cancelButton: 'btn btn-light px-5 py-2 fw-bold',
          title: 'fw-bold text-dark',
          htmlContainer: 'text-secondary'
        },
        backdrop: 'rgba(0,0,0,0.4)',
        showClass: {
          popup: 'animate__animated animate__fadeInUp animate__faster'
        },
        hideClass: {
          popup: 'animate__animated animate__fadeOutDown animate__faster'
        }
      }).then((result) => {
        if (result.isConfirmed) {
          // Proses logout
          if (window.auth && typeof window.auth.logout === 'function') {
            window.auth.logout();
          } else {
            // Fallback manual
            try {
              if (window.BCS && BCS.Storage && typeof BCS.Storage.removeSession === 'function') {
                BCS.Storage.removeSession();
              } else if (window.Session && typeof Session.clear === 'function') {
                Session.clear();
              }
            } catch (e) {}

            const keys = ['BCS_SESSION', 'token', 'user', 'nik', 'role', 'session_timestamp', 'BCS_REMEMBER'];
            keys.forEach(key => {
              localStorage.removeItem(key);
              sessionStorage.removeItem(key);
            });

            window.location.href = 'login.html';
          }
        }
      });
    });

    // =============================================
    // 10. INIT
    // =============================================
    loadUser();

  })();
</script>
</body>
</html>
