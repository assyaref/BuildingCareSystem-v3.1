<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Order Management</title>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* ===== DASHBOARD LAYOUT ===== */
        .wo-dashboard {
            max-width: 1440px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .wo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .wo-header .title-section h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
        }
        
        .wo-header .title-section p {
            font-size: 13px;
            color: #8a8fa6;
        }
        
        .wo-header .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(145deg, #1e5eff, #1557e8);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(30, 94, 255, 0.25);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(30, 94, 255, 0.35);
        }
        
        .btn-secondary {
            padding: 10px 20px;
            background: #ffffff;
            color: #1a1a2e;
            border: 2px solid #e8ecf5;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            border-color: #1e5eff;
            color: #1e5eff;
        }
        
        /* ===== STATISTICS CARDS ===== */
        .wo-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        
        .stat-card .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .stat-card .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .stat-card .stat-icon.blue { background: #e3f2fd; color: #0d47a1; }
        .stat-card .stat-icon.green { background: #e8f5e9; color: #1b5e20; }
        .stat-card .stat-icon.orange { background: #fff3e0; color: #e65100; }
        .stat-card .stat-icon.purple { background: #f3e5f5; color: #6a1b9a; }
        .stat-card .stat-icon.red { background: #fbe9e7; color: #b71c1c; }
        .stat-card .stat-icon.teal { background: #e0f7fa; color: #00695c; }
        
        .stat-card .stat-label {
            font-size: 12px;
            color: #8a8fa6;
            font-weight: 500;
        }
        
        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .stat-card .stat-change {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
        }
        
        .stat-change.up { background: #e8f5e9; color: #1b5e20; }
        .stat-change.down { background: #fbe9e7; color: #b71c1c; }
        
        /* ===== FILTER & SEARCH ===== */
        .wo-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 8px 14px;
            border: 2px solid #e8ecf5;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fafafc;
            color: #1a1a2e;
            transition: all 0.3s;
            min-width: 120px;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #1e5eff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(30, 94, 255, 0.08);
        }
        
        .filter-group .search-wrapper {
            position: relative;
        }
        
        .filter-group .search-wrapper input {
            padding-left: 36px;
            min-width: 200px;
        }
        
        .filter-group .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0b8c9;
        }
        
        .view-toggle {
            display: flex;
            gap: 4px;
            background: #f0f2f7;
            padding: 4px;
            border-radius: 10px;
        }
        
        .view-toggle button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #8a8fa6;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .view-toggle button.active {
            background: #ffffff;
            color: #1e5eff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        /* ===== TABLE ===== */
        .wo-table-container {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        
        .wo-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .wo-table thead {
            background: #f8faff;
            border-bottom: 2px solid #e8ecf5;
        }
        
        .wo-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #4a4a62;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .wo-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f2f7;
            color: #2d2d44;
            vertical-align: middle;
        }
        
        .wo-table tr:hover {
            background: #f8faff;
        }
        
        .wo-table .wo-number {
            font-weight: 700;
            color: #1e5eff;
            font-size: 12px;
        }
        
        .wo-table .wo-title {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .wo-table .wo-title .wo-sub {
            display: block;
            font-weight: 400;
            font-size: 11px;
            color: #8a8fa6;
        }
        
        /* ===== BADGES ===== */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }
        
        .badge-status-open { background: #e3f2fd; color: #0d47a1; }
        .badge-status-assigned { background: #e8eaf6; color: #283593; }
        .badge-status-in_progress { background: #fff3e0; color: #e65100; }
        .badge-status-pending_parts { background: #fbe9e7; color: #bf360c; }
        .badge-status-completed { background: #e8f5e9; color: #1b5e20; }
        .badge-status-cancelled { background: #eceff1; color: #546e7a; }
        
        .badge-priority-low { background: #e8eaf6; color: #283593; }
        .badge-priority-medium { background: #e3f2fd; color: #0d47a1; }
        .badge-priority-high { background: #fff3e0; color: #e65100; }
        .badge-priority-critical { background: #fbe9e7; color: #b71c1c; }
        
        .badge-emergency {
            background: #ffebee;
            color: #b71c1c;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ===== ACTION BUTTONS ===== */
        .action-cell {
            display: flex;
            gap: 6px;
        }
        
        .btn-action {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        
        .btn-action.view { background: #e3f2fd; color: #0d47a1; }
        .btn-action.view:hover { background: #bbdefb; }
        
        .btn-action.edit { background: #e8f5e9; color: #1b5e20; }
        .btn-action.edit:hover { background: #c8e6c9; }
        
        .btn-action.delete { background: #fbe9e7; color: #b71c1c; }
        .btn-action.delete:hover { background: #ffcdd2; }
        
        .btn-action.assign { background: #fff3e0; color: #e65100; }
        .btn-action.assign:hover { background: #ffe0b2; }
        
        .btn-action.complete { background: #e0f7fa; color: #00695c; }
        .btn-action.complete:hover { background: #b2dfdb; }
        
        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #f0f2f7;
        }
        
        .pagination button {
            padding: 6px 14px;
            border: 2px solid #e8ecf5;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 13px;
        }
        
        .pagination button:hover {
            border-color: #1e5eff;
            color: #1e5eff;
        }
        
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .pagination .page-info {
            font-size: 13px;
            color: #8a8fa6;
        }
        
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            max-width: 720px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 0;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.15);
        }
        
        .modal-header {
            padding: 24px 28px;
            border-bottom: 1px solid #f0f2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            z-index: 1;
        }
        
        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: #f0f2f7;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a4a62;
        }
        
        .modal-close:hover {
            background: #ffebee;
            color: #b71c1c;
        }
        
        .modal-body {
            padding: 28px;
        }
        
        .modal-footer {
            padding: 16px 28px;
            border-top: 1px solid #f0f2f7;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #fafafc;
            border-radius: 0 0 24px 24px;
        }
        
        /* ===== FORM ===== */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-row.full-width {
            grid-template-columns: 1fr;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #2d2d44;
        }
        
        .form-group label .required {
            color: #c62828;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 2px solid #e8ecf5;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s;
            background: #fafafc;
            color: #1a1a2e;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #1e5eff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(30, 94, 255, 0.08);
            background: #ffffff;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-group .helper-text {
            font-size: 11px;
            color: #8a8fa6;
        }
        
        .btn-cancel {
            padding: 10px 24px;
            background: transparent;
            border: 2px solid #e8ecf5;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            color: #4a4a62;
            transition: all 0.3s;
        }
        
        .btn-cancel:hover {
            border-color: #c62828;
            color: #c62828;
        }
        
        .btn-save {
            padding: 10px 28px;
            background: #1e5eff;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-save:hover {
            background: #1557e8;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(30, 94, 255, 0.3);
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .wo-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .wo-header .action-buttons {
                flex-direction: column;
            }
            
            .wo-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                flex-direction: column;
                width: 100%;
            }
            
            .filter-group select,
            .filter-group input,
            .filter-group .search-wrapper input {
                width: 100%;
                min-width: unset;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .wo-table-container {
                overflow-x: auto;
            }
            
            .wo-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .modal-content {
                margin: 10px;
                max-height: 95vh;
            }
            
            .modal-body {
                padding: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .wo-stats {
                grid-template-columns: 1fr;
            }
            
            .wo-header .title-section h1 {
                font-size: 20px;
            }
        }
        
        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8a8fa6;
        }
        
        .empty-state i {
            font-size: 48px;
            color: #d0d6e4;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        /* ===== TIMELINE ===== */
        .wo-timeline {
            position: relative;
            padding-left: 24px;
        }
        
        .wo-timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e8ecf5;
        }
        
        .timeline-item {
            position: relative;
            padding: 8px 0 16px 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 12px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1e5eff;
            border: 2px solid #ffffff;
            box-shadow: 0 0 0 3px #1e5eff;
        }
        
        .timeline-item .timeline-time {
            font-size: 11px;
            color: #8a8fa6;
        }
        
        .timeline-item .timeline-status {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .timeline-item .timeline-notes {
            font-size: 13px;
            color: #4a4a62;
        }
    </style>
</head>
<body>

    <div class="wo-dashboard">
        <!-- ===== HEADER ===== -->
        <div class="wo-header">
            <div class="title-section">
                <h1><i class="fas fa-clipboard-list" style="color:#1e5eff;margin-right:10px;"></i>Work Order Management</h1>
                <p>Kelola semua permintaan perbaikan dan pemeliharaan</p>
            </div>
            <div class="action-buttons">
                <button class="btn-secondary" id="exportBtn">
                    <i class="fas fa-file-export"></i> Export
                </button>
                <button class="btn-primary" id="btnAddWO">
                    <i class="fas fa-plus-circle"></i> Buat Work Order
                </button>
            </div>
        </div>

        <!-- ===== STATISTICS ===== -->
        <div class="wo-stats" id="woStats">
            <!-- Will be rendered by JavaScript -->
        </div>

        <!-- ===== CONTROLS ===== -->
        <div class="wo-controls">
            <div class="filter-group">
                <select id="filterStatus">
                    <option value="all">Semua Status</option>
                    <option value="open">Open</option>
                    <option value="assigned">Assigned</option>
                    <option value="in_progress">In Progress</option>
                    <option value="pending_parts">Pending Parts</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <select id="filterPriority">
                    <option value="all">Semua Prioritas</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari WO atau deskripsi...">
                </div>
            </div>
            <div class="view-toggle">
                <button class="active" data-view="table"><i class="fas fa-table"></i> Table</button>
                <button data-view="grid"><i class="fas fa-th"></i> Grid</button>
            </div>
        </div>

        <!-- ===== TABLE ===== -->
        <div class="wo-table-container" id="woTableContainer">
            <table class="wo-table">
                <thead>
                    <tr>
                        <th style="width:120px;">No. WO</th>
                        <th>Judul / Deskripsi</th>
                        <th>Kategori</th>
                        <th>Prioritas</th>
                        <th>Status</th>
                        <th>Pelapor</th>
                        <th>Tanggal</th>
                        <th style="width:150px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="woTableBody">
                    <!-- Will be rendered by JavaScript -->
                </tbody>
            </table>
            <div class="pagination">
                <button id="prevPage" disabled><i class="fas fa-chevron-left"></i></button>
                <span class="page-info" id="pageInfo">Halaman 1 dari 1</span>
                <button id="nextPage" disabled><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL TAMBAH / EDIT ===== -->
    <div class="modal" id="woModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-pen-to-square"></i> <span id="modalTitle">Buat Work Order</span></h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="woForm">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Judul Work Order <span class="required">*</span></label>
                            <input type="text" id="woTitle" placeholder="Masukkan judul WO" required>
                        </div>
                        <div class="form-group">
                            <label>Kategori <span class="required">*</span></label>
                            <select id="woCategory" required>
                                <option value="">Pilih Kategori...</option>
                                <!-- Will be populated by JS -->
                            </select>
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div class="form-group">
                            <label>Deskripsi <span class="required">*</span></label>
                            <textarea id="woDescription" placeholder="Jelaskan detail pekerjaan yang diperlukan..." required></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Lokasi / Gedung</label>
                            <input type="text" id="woBuilding" placeholder="Nama gedung / lokasi">
                        </div>
                        <div class="form-group">
                            <label>Lantai / Ruangan</label>
                            <input type="text" id="woLocation" placeholder="Lantai dan nomor ruangan">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prioritas <span class="required">*</span></label>
                            <select id="woPriority" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="woStatus">
                                <option value="open">Open</option>
                                <option value="assigned">Assigned</option>
                                <option value="in_progress">In Progress</option>
                                <option value="pending_parts">Pending Parts</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ditugaskan Kepada</label>
                            <select id="woAssignedTo">
                                <option value="">Pilih Teknisi...</option>
                                <!-- Will be populated by JS -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jadwal Pengerjaan</label>
                            <input type="date" id="woScheduledDate">
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div class="form-group">
                            <label>Catatan</label>
                            <textarea id="woNotes" placeholder="Catatan tambahan..." rows="2"></textarea>
                        </div>
                    </div>
                    <div class="form-row full-width">
                        <div class="form-group">
                            <label style="display:flex;align-items:center;gap:8px;">
                                <input type="checkbox" id="woEmergency">
                                <span>Darurat / Emergency</span>
                            </label>
                            <span class="helper-text">Centang jika ini adalah pekerjaan darurat yang membutuhkan penanganan segera</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelWO">Batal</button>
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save"></i> Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== MODAL DETAIL ===== -->
    <div class="modal" id="detailModal">
        <div class="modal-content" style="max-width:800px;">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detail Work Order</h3>
                <button class="modal-close" id="closeDetailModal">&times;</button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- Will be rendered by JavaScript -->
            </div>
        </div>
    </div>

    <!-- ======================================================
    JAVASCRIPT
    ======================================================= -->
    <script src="config/config.js"></script>
    <script src="assets/js/core/session.js"></script>
    <script src="assets/js/core/app.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/ui.js"></script>
    <script src="assets/js/core/utils.js"></script>
    
    <script>
    // ============================================
    // WORK ORDER MODULE
    // ============================================
    class WorkOrderManager {
        constructor() {
            this.api = new APIClient();
            this.currentPage = 1;
            this.itemsPerPage = 10;
            this.filters = {};
            this.totalPages = 1;
            this.isEditMode = false;
            this.editId = null;
            this.init();
        }

        init() {
            this.loadStats();
            this.loadData();
            this.loadCategories();
            this.loadTechnicians();
            this.bindEvents();
        }

        // ============================================
        // LOAD DATA
        // ============================================
        async loadData() {
            try {
                const params = {
                    page: this.currentPage,
                    limit: this.itemsPerPage,
                    status: this.filters.status || 'all',
                    priority: this.filters.priority || 'all',
                    search: this.filters.search || ''
                };
                
                const response = await this.api.get('/api/workorders', params);
                this.renderTable(response.data);
                this.totalPages = response.pagination?.totalPages || 1;
                this.updatePagination();
            } catch (error) {
                console.error('Error loading work orders:', error);
                this.renderEmptyState();
            }
        }

        async loadStats() {
            try {
                const response = await this.api.get('/api/workorders/stats');
                this.renderStats(response.data);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async loadCategories() {
            try {
                const response = await this.api.get('/api/workorders/categories');
                const select = document.getElementById('woCategory');
                select.innerHTML = '<option value="">Pilih Kategori...</option>';
                response.data.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async loadTechnicians() {
            try {
                const response = await this.api.get('/api/users/technicians');
                const select = document.getElementById('woAssignedTo');
                select.innerHTML = '<option value="">Pilih Teknisi...</option>';
                response.data.forEach(user => {
                    select.innerHTML += `<option value="${user.id}">${user.name}</option>`;
                });
            } catch (error) {
                console.error('Error loading technicians:', error);
            }
        }

        // ============================================
        // RENDER
        // ============================================
        renderStats(data) {
            const container = document.getElementById('woStats');
            const stats = [
                { label: 'Total WO', value: data.total || 0, icon: 'fa-clipboard-list', color: 'blue' },
                { label: 'Open', value: data.open || 0, icon: 'fa-circle', color: 'blue' },
                { label: 'In Progress', value: data.in_progress || 0, icon: 'fa-spinner', color: 'orange' },
                { label: 'Completed', value: data.completed || 0, icon: 'fa-check-circle', color: 'green' },
                { label: 'Pending Parts', value: data.pending_parts || 0, icon: 'fa-clock', color: 'purple' },
                { label: 'Critical', value: data.critical || 0, icon: 'fa-exclamation-triangle', color: 'red' }
            ];

            container.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">${stat.label}</span>
                        <div class="stat-icon ${stat.color}"><i class="fas ${stat.icon}"></i></div>
                    </div>
                    <div class="stat-value">${stat.value}</div>
                </div>
            `).join('');
        }

        renderTable(data) {
            const tbody = document.getElementById('woTableBody');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-clipboard-list"></i>
                                <h3>Belum ada Work Order</h3>
                                <p>Klik "Buat Work Order" untuk membuat permintaan baru</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><span class="wo-number">WO-${item.wo_number}</span></td>
                    <td>
                        <div class="wo-title">
                            ${item.title}
                            ${item.is_emergency ? '<span class="badge badge-emergency">⚠️ Darurat</span>' : ''}
                            <span class="wo-sub">${this.truncateText(item.description, 60)}</span>
                        </div>
                    </td>
                    <td>${item.category_name || '-'}</td>
                    <td><span class="badge badge-priority-${item.priority}">${this.capitalize(item.priority)}</span></td>
                    <td><span class="badge badge-status-${item.status}">${this.formatStatus(item.status)}</span></td>
                    <td>${item.reported_by_name || '-'}</td>
                    <td>${this.formatDate(item.reported_date)}</td>
                    <td>
                        <div class="action-cell">
                            <button class="btn-action view" data-id="${item.id}" title="Detail">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn-action edit" data-id="${item.id}" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            ${item.status !== 'completed' ? `
                                <button class="btn-action assign" data-id="${item.id}" title="Assign">
                                    <i class="fas fa-user-check"></i>
                                </button>
                                <button class="btn-action complete" data-id="${item.id}" title="Complete">
                                    <i class="fas fa-check"></i>
                                </button>
                            ` : ''}
                            <button class="btn-action delete" data-id="${item.id}" title="Hapus">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // Bind action buttons
            this.bindActionButtons();
        }

        renderEmptyState() {
            document.getElementById('woTableBody').innerHTML = `
                <tr>
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>Gagal Memuat Data</h3>
                            <p>Silakan coba lagi atau hubungi administrator</p>
                        </div>
                    </td>
                </tr>
            `;
        }

        updatePagination() {
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const info = document.getElementById('pageInfo');
            
            prevBtn.disabled = this.currentPage <= 1;
            nextBtn.disabled = this.currentPage >= this.totalPages;
            info.textContent = `Halaman ${this.currentPage} dari ${this.totalPages || 1}`;
        }

        // ============================================
        // BIND EVENTS
        // ============================================
        bindEvents() {
            // Filter
            document.getElementById('filterStatus').addEventListener('change', (e) => {
                this.filters.status = e.target.value;
                this.currentPage = 1;
                this.loadData();
            });

            document.getElementById('filterPriority').addEventListener('change', (e) => {
                this.filters.priority = e.target.value;
                this.currentPage = 1;
                this.loadData();
            });

            document.getElementById('searchInput').addEventListener('input', this.debounce((e) => {
                this.filters.search = e.target.value;
                this.currentPage = 1;
                this.loadData();
            }, 300));

            // Pagination
            document.getElementById('prevPage').addEventListener('click', () => {
                if (this.currentPage > 1) {
                    this.currentPage--;
                    this.loadData();
                }
            });

            document.getElementById('nextPage').addEventListener('click', () => {
                if (this.currentPage < this.totalPages) {
                    this.currentPage++;
                    this.loadData();
                }
            });

            // View toggle
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Modal
            document.getElementById('btnAddWO').addEventListener('click', () => this.openModal());
            document.getElementById('closeModal').addEventListener('click', () => this.closeModal('woModal'));
            document.getElementById('cancelWO').addEventListener('click', () => this.closeModal('woModal'));
            document.getElementById('closeDetailModal').addEventListener('click', () => this.closeModal('detailModal'));

            // Form submit
            document.getElementById('woForm').addEventListener('submit', (e) => {
                e.preventDefault();
                this.handleFormSubmit();
            });

            // Export
            document.getElementById('exportBtn').addEventListener('click', () => {
                this.exportData();
            });

            // Close modal on overlay click
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            });
        }

        bindActionButtons() {
            document.querySelectorAll('.btn-action.view').forEach(btn => {
                btn.addEventListener('click', () => this.viewDetail(btn.dataset.id));
            });

            document.querySelectorAll('.btn-action.edit').forEach(btn => {
                btn.addEventListener('click', () => this.editWO(btn.dataset.id));
            });

            document.querySelectorAll('.btn-action.delete').forEach(btn => {
                btn.addEventListener('click', () => this.deleteWO(btn.dataset.id));
            });

            document.querySelectorAll('.btn-action.assign').forEach(btn => {
                btn.addEventListener('click', () => this.assignWO(btn.dataset.id));
            });

            document.querySelectorAll('.btn-action.complete').forEach(btn => {
                btn.addEventListener('click', () => this.completeWO(btn.dataset.id));
            });
        }

        // ============================================
        // CRUD OPERATIONS
        // ============================================
        async handleFormSubmit() {
            const form = document.getElementById('woForm');
            const data = {
                title: document.getElementById('woTitle').value.trim(),
                category_id: document.getElementById('woCategory').value,
                description: document.getElementById('woDescription').value.trim(),
                building: document.getElementById('woBuilding').value.trim(),
                location: document.getElementById('woLocation').value.trim(),
                priority: document.getElementById('woPriority').value,
                status: document.getElementById('woStatus').value,
                assigned_to: document.getElementById('woAssignedTo').value || null,
                scheduled_date: document.getElementById('woScheduledDate').value || null,
                notes: document.getElementById('woNotes').value.trim(),
                is_emergency: document.getElementById('woEmergency').checked
            };

            // Validate
            if (!data.title || !data.description || !data.category_id) {
                UI.showWarning('Mohon isi semua field yang wajib (judul, deskripsi, kategori)');
                return;
            }

            try {
                let response;
                if (this.isEditMode && this.editId) {
                    response = await this.api.put(`/api/workorders/${this.editId}`, data);
                } else {
                    response = await this.api.post('/api/workorders', data);
                }

                if (response.success) {
                    UI.showSuccess(this.isEditMode ? 'Work Order berhasil diperbarui' : 'Work Order berhasil dibuat');
                    this.closeModal('woModal');
                    this.loadData();
                    this.loadStats();
                }
            } catch (error) {
                console.error('Error saving work order:', error);
                UI.showError('Gagal menyimpan Work Order');
            }
        }

        async deleteWO(id) {
            const confirm = await Swal.fire({
                title: 'Hapus Work Order?',
                text: 'Data yang dihapus tidak dapat dikembalikan!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal'
            });

            if (confirm.isConfirmed) {
                try {
                    const response = await this.api.delete(`/api/workorders/${id}`);
                    if (response.success) {
                        UI.showSuccess('Work Order berhasil dihapus');
                        this.loadData();
                        this.loadStats();
                    }
                } catch (error) {
                    console.error('Error deleting work order:', error);
                    UI.showError('Gagal menghapus Work Order');
                }
            }
        }

        async assignWO(id) {
            Swal.fire({
                title: 'Assign Work Order',
                text: 'Fitur assign akan segera tersedia',
                icon: 'info',
                confirmButtonColor: '#1e5eff'
            });
        }

        async completeWO(id) {
            const confirm = await Swal.fire({
                title: 'Selesaikan Work Order?',
                text: 'Apakah pekerjaan ini sudah selesai 100%?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#2e7d32',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Ya, Selesai!',
                cancelButtonText: 'Batal'
            });

            if (confirm.isConfirmed) {
                try {
                    const response = await this.api.put(`/api/workorders/${id}/complete`);
                    if (response.success) {
                        UI.showSuccess('Work Order telah selesai!');
                        this.loadData();
                        this.loadStats();
                    }
                } catch (error) {
                    console.error('Error completing work order:', error);
                    UI.showError('Gagal menyelesaikan Work Order');
                }
            }
        }

        async viewDetail(id) {
            try {
                const response = await this.api.get(`/api/workorders/${id}`);
                this.renderDetail(response.data);
                document.getElementById('detailModal').classList.add('active');
            } catch (error) {
                console.error('Error loading detail:', error);
                UI.showError('Gagal memuat detail Work Order');
            }
        }

        renderDetail(data) {
            const container = document.getElementById('detailContent');
            container.innerHTML = `
                <div style="display:grid;gap:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:12px;">
                        <div>
                            <h2 style="font-size:20px;color:#1a1a2e;">${data.title}</h2>
                            <span class="wo-number" style="font-size:14px;">WO-${data.wo_number}</span>
                            ${data.is_emergency ? '<span class="badge badge-emergency" style="margin-left:8px;">⚠️ Darurat</span>' : ''}
                        </div>
                        <div style="display:flex;gap:8px;">
                            <span class="badge badge-status-${data.status}">${this.formatStatus(data.status)}</span>
                            <span class="badge badge-priority-${data.priority}">${this.capitalize(data.priority)}</span>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#f8faff;padding:16px;border-radius:12px;">
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Kategori</div>
                            <div style="font-weight:600;">${data.category_name || '-'}</div>
                        </div>
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Pelapor</div>
                            <div style="font-weight:600;">${data.reported_by_name || '-'}</div>
                        </div>
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Ditugaskan Kepada</div>
                            <div style="font-weight:600;">${data.assigned_to_name || 'Belum ditugaskan'}</div>
                        </div>
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Tanggal Laporan</div>
                            <div style="font-weight:600;">${this.formatDate(data.reported_date)}</div>
                        </div>
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Jadwal</div>
                            <div style="font-weight:600;">${this.formatDate(data.scheduled_date) || 'Belum dijadwalkan'}</div>
                        </div>
                        <div>
                            <div style="font-size:11px;color:#8a8fa6;">Lokasi</div>
                            <div style="font-weight:600;">${data.building || '-'} ${data.location ? ' - ' + data.location : ''}</div>
                        </div>
                    </div>

                    <div>
                        <div style="font-size:12px;font-weight:600;color:#4a4a62;margin-bottom:4px;">Deskripsi</div>
                        <p style="color:#2d2d44;line-height:1.6;">${data.description || '-'}</p>
                    </div>

                    ${data.notes ? `
                        <div>
                            <div style="font-size:12px;font-weight:600;color:#4a4a62;margin-bottom:4px;">Catatan</div>
                            <p style="color:#2d2d44;line-height:1.6;">${data.notes}</p>
                        </div>
                    ` : ''}

                    <div style="border-top:1px solid #f0f2f7;padding-top:16px;">
                        <div style="font-size:12px;font-weight:600;color:#4a4a62;margin-bottom:12px;">Timeline</div>
                        <div class="wo-timeline">
                            ${data.timeline && data.timeline.length > 0 ? data.timeline.map(item => `
                                <div class="timeline-item">
                                    <div class="timeline-time">${this.formatDateTime(item.created_at)}</div>
                                    <div class="timeline-status">${this.formatStatus(item.status)}</div>
                                    ${item.notes ? `<div class="timeline-notes">${item.notes}</div>` : ''}
                                </div>
                            `).join('') : '<p style="color:#8a8fa6;">Belum ada aktivitas</p>'}
                        </div>
                    </div>

                    ${data.attachments && data.attachments.length > 0 ? `
                        <div style="border-top:1px solid #f0f2f7;padding-top:16px;">
                            <div style="font-size:12px;font-weight:600;color:#4a4a62;margin-bottom:8px;">Lampiran</div>
                            ${data.attachments.map(file => `
                                <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:#f8faff;border-radius:8px;margin-bottom:4px;">
                                    <i class="fas fa-paperclip" style="color:#8a8fa6;"></i>
                                    <span style="font-size:13px;">${file.file_name}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // ============================================
        // MODAL HANDLING
        // ============================================
        openModal(data = null) {
            const modal = document.getElementById('woModal');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('woForm');

            if (data) {
                this.isEditMode = true;
                this.editId = data.id;
                title.textContent = 'Edit Work Order';
                
                document.getElementById('woTitle').value = data.title;
                document.getElementById('woCategory').value = data.category_id || '';
                document.getElementById('woDescription').value = data.description;
                document.getElementById('woBuilding').value = data.building || '';
                document.getElementById('woLocation').value = data.location || '';
                document.getElementById('woPriority').value = data.priority;
                document.getElementById('woStatus').value = data.status;
                document.getElementById('woAssignedTo').value = data.assigned_to || '';
                document.getElementById('woScheduledDate').value = data.scheduled_date || '';
                document.getElementById('woNotes').value = data.notes || '';
                document.getElementById('woEmergency').checked = data.is_emergency || false;
            } else {
                this.isEditMode = false;
                this.editId = null;
                title.textContent = 'Buat Work Order';
                form.reset();
                document.getElementById('woPriority').value = 'medium';
                document.getElementById('woStatus').value = 'open';
            }

            modal.classList.add('active');
        }

        async editWO(id) {
            try {
                const response = await this.api.get(`/api/workorders/${id}`);
                this.openModal(response.data);
            } catch (error) {
                console.error('Error loading work order for edit:', error);
                UI.showError('Gagal memuat data untuk diedit');
            }
        }

        closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ============================================
        // EXPORT
        // ============================================
        async exportData() {
            try {
                const response = await this.api.get('/api/workorders/export', {
                    format: 'excel',
                    filters: this.filters
                });
                
                const blob = new Blob([response.data], { 
                    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `work-orders-${new Date().toISOString().slice(0,10)}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);
                
                UI.showSuccess('Export berhasil');
            } catch (error) {
                console.error('Error exporting data:', error);
                UI.showError('Gagal mengekspor data');
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        formatStatus(status) {
            const map = {
                'open': 'Open',
                'assigned': 'Assigned',
                'in_progress': 'In Progress',
                'pending_parts': 'Pending Parts',
                'completed': 'Completed',
                'cancelled': 'Cancelled'
            };
            return map[status] || status;
        }

        formatDate(date) {
            if (!date) return '-';
            const d = new Date(date);
            return d.toLocaleDateString('id-ID', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        formatDateTime(date) {
            if (!date) return '-';
            const d = new Date(date);
            return d.toLocaleString('id-ID', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    }
